<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Poom Academy — Concept: Je Reis (smart trainer)</title>
<link rel="stylesheet" href="fonts/inter.css">
<link rel="stylesheet" href="fonts/poster.css">
<style>
  /* Korean poster face (subset) for decorative hangul — echoes 태권도 brush weight */
  @font-face{font-family:'Black Han Sans';font-style:normal;font-weight:400;font-display:swap;
    src:url(fonts/blackhansans-kr.woff2) format('woff2');}
  :root{
    --ink:#1A1712; --mid:#101828; --page:#F4F1EA; --gray:#6B6459; --line:#E7E1D5;
    --surface:#FFFFFF; --soft:#EFEADF;
    --seal:#C1121F; --seal-deep:#8E0D17;
    --text:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --cond:'Big Shoulders Display',system-ui,sans-serif;
    --poster:'Saira Stencil One',system-ui,sans-serif;
    --kor:'Black Han Sans','Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
    /* live element tokens (set per form by JS; fire default) */
    --el:#F0522B; --deep:#B01430; --glow:#FF7A18; --tint:#FFF4EF;
    --elline:rgba(207,60,35,.15); --hot:#F8A487; --elink:#3A0F14;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:radial-gradient(120% 60% at 50% -10%, #16202e, transparent 60%), #0B0E14;
    min-height:100vh;font-family:var(--text);color:var(--ink);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    display:flex;justify-content:center;align-items:flex-start;padding:32px 20px 56px;
  }
  .cond{font-family:var(--cond);text-transform:uppercase;line-height:1.02}
  .poster{font-family:var(--poster);text-transform:uppercase;line-height:.9}
  button{font-family:inherit;cursor:pointer}

  /* ---------- Device frame ---------- */
  .device{
    position:relative;width:390px;height:844px;flex:none;border-radius:46px;background:#0B0E14;
    overflow:hidden;border:1px solid #1b2130;
    box-shadow:0 2px 0 rgba(255,255,255,.05) inset, 0 40px 90px -30px rgba(0,0,0,.8), 0 0 0 10px #06080C;
  }
  .concept-flag{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:120;
    font-family:var(--cond);text-transform:uppercase;letter-spacing:.18em;font-size:9.5px;font-weight:700;
    color:rgba(255,255,255,.34);pointer-events:none}
  .stage{position:absolute;inset:0;background:var(--page);overflow:hidden}
  .surface{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;
    -webkit-overflow-scrolling:touch}
  .surface::-webkit-scrollbar{display:none}
  .pad{padding:0 22px 130px}
  #today-surface .pad{padding-bottom:84px}
  @media (max-width:440px){
    body{padding:0;background:var(--page)}
    .device{width:100vw;height:100vh;height:100dvh;border-radius:0;border:0;box-shadow:none}
    .concept-flag{display:none}
  }

  /* ---------- Status row ---------- */
  .status{position:sticky;top:0;z-index:20;
    display:flex;align-items:center;justify-content:space-between;
    padding:calc(env(safe-area-inset-top) + 20px) 22px 10px;
    background:rgba(244,241,234,.62);
    -webkit-backdrop-filter:blur(16px) saturate(1.3);backdrop-filter:blur(16px) saturate(1.3)}
  /* soft fade under the sticky header so scrolling content dissolves instead of hard-cutting */
  .status::after{content:"";position:absolute;left:0;right:0;top:100%;height:16px;pointer-events:none;
    background:linear-gradient(rgba(244,241,234,.62),rgba(244,241,234,0));
    -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);
    -webkit-mask-image:linear-gradient(#000,transparent);mask-image:linear-gradient(#000,transparent)}
  .status .date{font-family:var(--cond);text-transform:uppercase;letter-spacing:.12em;font-size:11.5px;color:var(--gray)}
  .streakchip{display:inline-flex;align-items:center;gap:6px;background:rgba(240,82,43,.14);color:#C4431C;
    border:1px solid rgba(240,82,43,.26);
    border-radius:999px;padding:5px 11px;font-family:var(--cond);font-weight:700;font-size:13px}
  .streakchip .fl{font-size:13px}
  .streakchip.flare{animation:flare .7s ease}
  @keyframes flare{0%{transform:scale(1)}40%{transform:scale(1.16)}100%{transform:scale(1)}}
  .status-end{display:flex;align-items:center;gap:10px}
  .avatar{width:37px;height:37px;border-radius:50%;flex:none;padding:3px;box-sizing:border-box;cursor:pointer;
    box-shadow:0 1px 4px rgba(0,0,0,.16);background:var(--soft)}
  .avatar img{width:100%;height:100%;object-fit:cover;display:block;border-radius:50%;
    border:1.6px solid var(--page);box-sizing:border-box;background:var(--soft)}

  /* ---------- Coach greeting ---------- */
  .greet{padding:10px 0 4px;display:flex;align-items:flex-end;gap:8px}
  .greet-txt{flex:1 1 auto;min-width:0}
  .greet-masc{flex:0 0 auto;width:100px;height:126px;margin-bottom:-2px;display:block;cursor:pointer;
    pointer-events:auto;-webkit-tap-highlight-color:transparent;user-select:none;
    transform-origin:50% 100%;filter:drop-shadow(0 5px 9px rgba(16,24,40,.14));will-change:transform;transition:transform .13s ease}
  .greet-masc:active{transform:scale(.955)}
  .gm-b{position:relative;display:block;width:100%;height:100%;transform-origin:50% 100%}
  .gm-i{display:block;width:100%;height:100%;object-fit:contain;object-position:bottom center}
  .gm-blink{position:absolute;inset:0;opacity:0}
  .gm-b.blink .gm-blink{opacity:1}
  .greet .hello{font-family:var(--cond);text-transform:uppercase;font-weight:800;font-size:42px;
    letter-spacing:-.015em;line-height:.98;color:var(--ink)}
  .greet .hello .wave{-webkit-text-fill-color:initial}
  .greet .line{margin-top:8px;font-size:15px;line-height:1.5;color:#48505E;max-width:32ch}

  /* section eyebrow */
  .eye{display:flex;align-items:center;gap:10px;margin:26px 2px 12px}
  .eye h4{font-family:var(--cond);text-transform:uppercase;font-size:12.5px;font-weight:700;
    letter-spacing:.14em;color:var(--gray);margin:0}
  .eye .ln{flex:1;height:1px;background:var(--line)}

  /* ---------- Focus card (today's training) ---------- */
  .focus{position:relative;border-radius:26px;overflow:hidden;color:#fff;
    background:
      radial-gradient(130% 100% at 88% 4%, rgba(255,255,255,.16), transparent 55%),
      linear-gradient(152deg, var(--el) 0%, var(--deep) 92%);
    box-shadow:0 20px 40px -26px rgba(16,24,40,.5);
    padding:22px 22px 20px;isolation:isolate}
  .focus::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.20;mix-blend-mode:overlay;
    background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="140" height="140"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter><rect width="140" height="140" filter="url(%23n)" opacity="0.5"/></svg>')}
  .focus .fwm{position:absolute;right:-2px;top:50%;transform:translateY(-52%);
    font-family:var(--kor);
    font-weight:800;font-size:166px;line-height:1;color:rgba(255,255,255,.12);
    pointer-events:none;user-select:none;z-index:-1;letter-spacing:-.03em}
  .focus .ftop{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .femblem{width:46px;height:46px;border-radius:13px;flex:none;display:grid;place-items:center;
    background:linear-gradient(150deg, rgba(255,255,255,.22), rgba(255,255,255,.05));
    border:1px solid rgba(255,255,255,.24)}
  .femblem svg{width:26px;height:26px;color:#fff}
  .feye{font-family:var(--cond);text-transform:uppercase;letter-spacing:.16em;font-size:11px;
    font-weight:700;color:rgba(255,255,255,.82)}
  .fkick{font-family:var(--cond);text-transform:uppercase;letter-spacing:.16em;font-size:11px;
    color:rgba(255,255,255,.7);margin-bottom:3px}
  .focus h2{font-family:var(--cond);text-transform:uppercase;font-weight:800;font-size:34px;
    line-height:.94;letter-spacing:-.01em;margin:0 0 10px}
  .focus .intent{font-size:14.5px;line-height:1.45;color:rgba(255,255,255,.9);max-width:26ch}
  .fmeta{display:flex;align-items:center;gap:14px;margin-top:16px;
    font-family:var(--cond);text-transform:uppercase;letter-spacing:.06em;font-size:12px;color:rgba(255,255,255,.78)}
  .fmeta .d{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.45)}
  .startbtn{position:relative;overflow:hidden;
    margin-top:8px;width:100%;border:1.5px solid rgba(20,40,90,.18);box-sizing:border-box;border-radius:15px;background:#fff;color:#000;
    font-family:var(--cond);text-transform:uppercase;font-weight:800;letter-spacing:.03em;font-size:16.5px;
    height:64px;padding:0 16px;display:flex;align-items:center;justify-content:center;gap:10px;
    box-shadow:0 10px 22px -14px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.95), inset 0 -2px 3px rgba(20,40,90,.07);transition:transform .12s}
  .startbtn::before{content:'';position:absolute;top:-60%;bottom:-60%;left:0;width:48%;pointer-events:none;
    background:linear-gradient(100deg,rgba(40,60,100,0) 0%,rgba(40,60,100,.02) 24%,rgba(255,255,255,.5) 50%,rgba(40,60,100,.02) 76%,rgba(40,60,100,0) 100%);
    filter:blur(3.5px);will-change:transform;
    transform:translateX(-300%) skewX(-16deg)}
  .startbtn.sheen::before{animation:ctaSheen 6.25s ease-in-out}
  @keyframes ctaSheen{from{transform:translateX(-300%) skewX(-16deg)}to{transform:translateX(560%) skewX(-16deg)}}
  .startbtn:active{transform:scale(.975)}
  .startbtn svg{width:19px;height:19px}
  .startbtn-ic{width:44px;height:44px;flex:none;background:currentColor;transform:translateZ(0);backface-visibility:hidden;
    -webkit-mask:url(assets/icons/Coach1.png) center/contain no-repeat;
    mask:url(assets/icons/Coach1.png) center/contain no-repeat}

  /* ---------- Up next (secondary) ---------- */
  .upnext{display:flex;align-items:center;gap:13px;margin-top:14px;background:var(--surface);
    border:1px solid var(--line);border-radius:16px;padding:13px 15px}
  .upnext .un-ic{width:34px;height:34px;border-radius:10px;flex:none;display:grid;place-items:center;
    background:var(--soft);color:var(--gray)}
  .upnext .un-ic svg{width:18px;height:18px}
  .upnext .un-t{flex:1;min-width:0}
  .upnext .un-t b{font-size:14px;font-weight:600;color:var(--ink)}
  .upnext .un-t small{display:block;color:var(--gray);font-size:12px;margin-top:1px}
  .upnext .un-when{font-family:var(--cond);text-transform:uppercase;font-size:11px;letter-spacing:.08em;color:var(--gray)}

  /* ---------- Journey ribbon (on today) ---------- */
  .ribbon{margin-top:14px;background:var(--surface);border:1px solid var(--line);border-radius:18px;
    padding:16px 17px;cursor:pointer;transition:transform .12s}
  .ribbon:active{transform:scale(.99)}
  .ribbon .rb-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .ribbon .rb-t{font-family:var(--cond);text-transform:uppercase;font-weight:700;font-size:14px;letter-spacing:.02em}
  .ribbon .rb-n{font-family:var(--cond);text-transform:uppercase;font-size:11.5px;letter-spacing:.06em;color:var(--gray)}
  .track{display:flex;gap:6px}
  .track i{flex:1;height:7px;border-radius:4px;background:var(--soft)}
  .track i.on{background:linear-gradient(90deg,var(--el),var(--deep))}
  .track i.cur{background:var(--el);box-shadow:0 0 0 3px var(--tint)}
  .ribbon .rb-foot{margin-top:11px;display:flex;align-items:center;justify-content:space-between;
    font-size:12.5px;color:var(--gray)}
  .ribbon .rb-foot .go{font-family:var(--cond);text-transform:uppercase;letter-spacing:.06em;color:var(--ink);
    display:inline-flex;align-items:center;gap:5px}
  .ribbon .rb-foot .go svg{width:14px;height:14px}

  .greet .gday{margin-top:11px;padding-left:16px;position:relative}
  .greet .gday::before{content:'';position:absolute;left:0;top:.18em;bottom:.18em;width:6px;
    border-radius:3px;background:var(--gd,var(--el));opacity:.9}
  .greet .gday q{font-style:italic;font-weight:600;font-size:14.5px;line-height:1.5;
    color:var(--gray);quotes:'“' '”'}

  /* ---------- Journey map ---------- */
  .jhead{padding:16px 0 4px}
  .jhead h1{font-family:var(--cond);text-transform:uppercase;font-weight:800;font-size:32px;letter-spacing:-.01em;margin:0}
  .jhead .js{margin-top:8px;color:var(--gray);font-size:14px}
  /* geup-level slider (coloured fill = current grade) */
  .beltpick{margin:18px 0 6px;background:var(--surface);border:1px solid var(--line);
    border-radius:22px;padding:16px 18px 18px}
  .bp-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .bp-k{font-family:var(--cond);text-transform:uppercase;letter-spacing:.14em;font-size:11px;
    font-weight:700;color:var(--gray)}
  .bp-band{font-family:var(--cond);text-transform:uppercase;font-weight:800;font-size:20px;
    letter-spacing:.01em;color:var(--ink)}
  .bp-slider{position:relative;height:60px;margin:16px 0 0;touch-action:pan-y;isolation:isolate}
  .bp-track{position:absolute;inset:0;border-radius:999px;overflow:hidden;background:#F1EEE7;
    box-shadow:inset 0 1px 3px rgba(0,0,0,.10), inset 0 0 0 1px rgba(0,0,0,.05)}
  .bp-dots{position:absolute;left:26px;right:26px;top:50%;transform:translateY(-50%);height:8px;
    display:flex;align-items:center;justify-content:space-between;pointer-events:none;z-index:2}
  .bp-dots i{width:5px;height:5px;border-radius:50%;background:var(--gray);
    transition:background-color .3s ease}
  .bp-fill{position:absolute;left:0;top:0;bottom:0;width:0;z-index:1;
    transition:width .28s cubic-bezier(.34,1.3,.36,1), background .34s ease}
  .bp-thumb{position:absolute;top:50%;left:26px;width:52px;height:52px;transform:translate(-50%,-50%);
    border-radius:50%;background:#F4F4F1;border:3px solid rgba(255,255,255,.92);
    box-shadow:0 5px 16px -2px rgba(16,24,40,.55), 0 1px 0 rgba(0,0,0,.06);
    display:flex;align-items:center;justify-content:center;gap:6px;pointer-events:none;
    transition:left .28s cubic-bezier(.34,1.3,.36,1), background .34s ease, border-color .34s ease;z-index:3}
  .bp-thumb.poom{flex-direction:column;gap:5px}
  .bp-thumb .pline{width:22px;height:3px;border-radius:2px;background:#fff;
    box-shadow:0 0 0 1px rgba(0,0,0,.22)}
  .bp-slider input[type=range]{-webkit-appearance:none;appearance:none;position:absolute;
    left:0;top:0;width:100%;height:60px;margin:0;background:transparent;cursor:pointer;z-index:4}
  .bp-slider input[type=range]::-webkit-slider-runnable-track{height:60px;background:transparent}
  .bp-slider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:56px;height:56px;
    border-radius:50%;background:transparent;border:0}
  .bp-slider input[type=range]::-moz-range-track{height:60px;background:transparent}
  .bp-slider input[type=range]::-moz-range-thumb{width:56px;height:56px;border-radius:50%;
    background:transparent;border:0}
  .bp-slider input[type=range]:focus{outline:none}
  .bp-meta{margin-top:16px;font-size:13.5px;color:var(--gray)}
  .bp-meta b{color:var(--ink);font-weight:700}
  /* micro-animations: grade number pops; belt-info line slides in from the sliding direction */
  .bp-band{transform-origin:center center}
  @keyframes bpPop{0%{transform:scale(.94);opacity:.4}55%{transform:scale(1.04);opacity:1}100%{transform:scale(1);opacity:1}}
  .bp-band.pop{animation:bpPop .4s cubic-bezier(.2,.7,.3,1)}
  /* cross-fade push: old belt-info line pushes aside & fades out, new one slides in & fades in */
  .bp-meta{position:relative;overflow:hidden;padding-bottom:2px}
  .bp-meta-cur,.bp-meta-ghost{display:inline-block;white-space:nowrap}
  .bp-meta-ghost{position:absolute;left:0;top:0;pointer-events:none}
  @keyframes bpEnterR{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
  @keyframes bpEnterL{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
  @keyframes bpExitL{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-24px)}}
  @keyframes bpExitR{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(24px)}}
  .bp-meta-cur.enter-r{animation:bpEnterR .38s cubic-bezier(.22,.9,.3,1)}
  .bp-meta-cur.enter-l{animation:bpEnterL .38s cubic-bezier(.22,.9,.3,1)}
  .bp-meta-ghost.exit-l{animation:bpExitL .38s cubic-bezier(.22,.9,.3,1) forwards}
  .bp-meta-ghost.exit-r{animation:bpExitR .38s cubic-bezier(.22,.9,.3,1) forwards}
  /* Belt-picker bottom sheet (opened from the profile avatar) */
  .beltsheet-ov{position:absolute;inset:0;z-index:120;display:flex;align-items:flex-end;
    background:rgba(16,20,26,0);transition:background .28s;pointer-events:none}
  .beltsheet-ov.show{background:rgba(16,20,26,.44);pointer-events:auto}
  .bs-backdrop{position:absolute;inset:0;cursor:pointer}
  .beltsheet{position:relative;z-index:1;width:100%;background:var(--page);border-radius:26px 26px 0 0;
    padding:10px 22px 30px;box-shadow:0 -10px 40px rgba(0,0,0,.22);
    transform:translateY(100%);transition:transform .34s cubic-bezier(.22,1,.36,1)}
  .beltsheet-ov.show .beltsheet{transform:translateY(0)}
  .bs-grab{width:40px;height:4px;border-radius:2px;background:var(--line);margin:2px auto 12px}
  .bs-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:2px}
  .bs-head h3{font-family:var(--cond);text-transform:uppercase;letter-spacing:.02em;font-size:21px;color:var(--ink)}
  .bs-done{font-family:var(--cond);text-transform:uppercase;letter-spacing:.05em;font-size:13.5px;color:var(--el);
    background:none;border:0;cursor:pointer;padding:6px 2px;font-weight:700}
  .beltsheet .beltpick{margin:14px 0 0}
  /* Reis grade chip (opens the belt sheet) */
  .gradechip{display:inline-flex;align-items:center;gap:9px;margin-top:14px;cursor:pointer;
    background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:7px 14px 7px 9px;
    font-family:var(--cond);text-transform:uppercase;letter-spacing:.03em;font-size:13px;font-weight:700;color:var(--ink)}
  .gradechip .gc-ring{width:20px;height:20px;border-radius:50%;flex:none;box-sizing:border-box;
    border:2px solid var(--page);box-shadow:0 0 0 1px rgba(0,0,0,.1)}
  .gradechip svg{width:15px;height:15px;color:var(--gray)}
  /* Depth scroll — mascot is a mid-layer; cards weave behind (.back) and in front (.front) */
  .depth{position:relative;isolation:isolate;margin:2px 0 14px}
  .depth-fig{position:sticky;top:34vh;height:0;z-index:3;text-align:center;pointer-events:none}
  .depth-fig img{display:inline-block;width:156px;height:auto;transform:translate(18%,-57%);
    filter:drop-shadow(0 14px 18px rgba(16,24,40,.26))}
  .depth-end{height:150px;pointer-events:none}
  /* Guep band — the belt slider collapses into a screen-wide colour band on scroll */
  .gband{position:absolute;left:0;right:0;top:0;z-index:6;height:34px;display:flex;
    align-items:center;justify-content:center;pointer-events:none;
    transform:translateY(calc((var(--p,0) - 1) * 100%));opacity:var(--p,0);
    box-shadow:0 8px 20px -10px rgba(0,0,0,.45);will-change:transform,opacity}
  .gband .gb-lab{font-family:var(--cond);text-transform:uppercase;letter-spacing:.14em;
    font-size:11.5px;font-weight:800;white-space:nowrap}
  .beltpick{transition:opacity .12s linear}
  .depth-card{position:relative;margin:15px 0;border-radius:20px;padding:18px 20px;background:var(--surface);
    border:1px solid var(--line);box-shadow:0 16px 36px -22px rgba(16,24,40,.55)}
  .depth-card.back{z-index:1}
  .depth-card.front{z-index:5}
  .depth-card .dc-k{font-family:var(--cond);text-transform:uppercase;letter-spacing:.12em;font-size:11px;
    font-weight:700;color:var(--gray)}
  .depth-card h3{margin:.3em 0 .12em;font-family:var(--cond);text-transform:uppercase;font-weight:800;
    font-size:21px;color:var(--ink);letter-spacing:.01em;line-height:1.05}
  .depth-card p{margin:0;font-size:13px;color:var(--gray)}
  .depth-card.tinted{background:linear-gradient(150deg,var(--el),var(--deep));border-color:transparent}
  .depth-card.tinted .dc-k,.depth-card.tinted p{color:rgba(255,255,255,.82)}
  .depth-card.tinted h3{color:#fff}
  .jbar{margin:16px 0 6px;height:8px;border-radius:5px;background:var(--soft);overflow:hidden}
  .jbar i{display:block;height:100%;width:0;border-radius:5px;background:linear-gradient(90deg,#F0522B,#B01430);
    transition:width 1s cubic-bezier(.4,0,.1,1)}
  .path{position:relative;margin:30px 0 10px;padding-left:6px}
  .path .spine{position:absolute;left:33px;top:8px;bottom:30px;width:3px;border-radius:2px;
    background:linear-gradient(var(--line),var(--line))}
  .node{position:relative;display:flex;align-items:center;gap:16px;padding:11px 0;z-index:1}
  .ndot{width:56px;height:56px;flex:none;border-radius:17px;display:grid;place-items:center;position:relative;
    background:var(--surface);border:2px solid var(--line);color:#C3CAD6;transition:transform .2s}
  .ndot svg{width:30px;height:30px}
  .node.done .ndot{background:linear-gradient(150deg,var(--n-el),var(--n-deep));border-color:transparent;color:#fff}
  .node.cur .ndot{background:linear-gradient(150deg,var(--n-el),var(--n-deep));border-color:transparent;color:#fff;
    transform:scale(1.08);box-shadow:0 0 0 5px var(--n-tint), 0 14px 24px -12px rgba(16,24,40,.4)}
  .node.cur .ndot::after{content:"";position:absolute;inset:-2px;border-radius:17px;border:2px solid var(--n-el);
    animation:pulse 1.8s ease-out infinite}
  @keyframes pulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(1.5);opacity:0}}
  .ncheck{position:absolute;right:-3px;bottom:-3px;width:22px;height:22px;border-radius:50%;background:#12B76A;
    border:2.5px solid var(--page);display:grid;place-items:center;color:#fff}
  .ncheck svg{width:12px;height:12px}
  .nlabel{flex:1;min-width:0}
  .nlabel .nt{font-family:var(--cond);text-transform:uppercase;font-weight:700;font-size:17px;letter-spacing:.01em;
    color:var(--ink);line-height:1.05}
  .node.up .nlabel .nt{color:#98A2B3}
  .nlabel .ns{font-size:12.5px;color:var(--gray);margin-top:2px}
  .node.up .nlabel .ns{color:#B6BECC}
  .nlabel .cur-cta{margin-top:7px;display:inline-flex;align-items:center;gap:6px;background:var(--n-el);color:#fff;
    border:0;border-radius:10px;padding:8px 13px;font-family:var(--cond);text-transform:uppercase;font-weight:700;
    font-size:12.5px;letter-spacing:.03em}
  .nlabel .cur-cta svg{width:14px;height:14px}
  .node.goal .ndot{background:var(--surface);border:2px dashed #CBC2B0;color:#98A2B3}
  .node.goal .nlabel .nt{color:#5A5348}

  /* Summit (mountain destination) */
  .summit{position:relative;margin-top:8px;padding-top:70px;overflow:hidden;border-radius:22px}
  .summit-ink{position:absolute;left:0;right:0;bottom:0;height:150px;pointer-events:none}
  .summit-ink .mtn{height:150px}
  .summit .node.goal{position:relative;z-index:1;padding:14px 4px 26px}
  .summit .goalseal{opacity:.5;filter:grayscale(.3)}
  .summit .node.goal .ndot{width:64px;height:64px;border-radius:18px;background:transparent;border:0;padding:0}

  /* ---------- Bottom floating nav (2 items) ---------- */
  .navdock{position:absolute;left:22px;right:22px;bottom:calc(env(safe-area-inset-bottom) + 20px);
    z-index:60;display:flex;align-items:center;gap:10px}
  .fnav{position:relative;flex:1;min-height:58px;display:flex;justify-content:space-between;gap:4px;background:rgba(252,250,246,.5);
    -webkit-backdrop-filter:blur(30px) saturate(1.9);backdrop-filter:blur(30px) saturate(1.9);border-radius:999px;padding:5px;
    border:1px solid rgba(255,255,255,.55);
    box-shadow:0 14px 32px -16px rgba(40,24,12,.4), 0 1px 0 rgba(255,255,255,.75) inset}
  .fnav button{position:relative;z-index:1;flex:1 1 0;border:0;background:transparent;color:rgba(30,22,16,.56);border-radius:17px;
    padding:6px 4px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;font-family:var(--cond);text-transform:uppercase;
    font-weight:700;letter-spacing:.03em;font-size:8.5px;line-height:1;transition:color .32s ease}
  .fnav button svg{width:24px;height:24px}
  .fnav button.on{color:var(--beltink,var(--elink))}
  /* Sliding frosted-glass highlight behind the active tab */
  .fnav-hl{position:absolute;top:5px;bottom:5px;left:0;width:0;z-index:0;pointer-events:none;border-radius:999px;
    background:linear-gradient(180deg,#ffffff,#fff3ec);
    border:1px solid rgba(255,255,255,.9);
    box-shadow:0 5px 14px -5px rgba(120,52,20,.32), 0 1px 0 rgba(255,255,255,.85) inset;
    transform:translateX(0);opacity:0;
    transition:transform .46s cubic-bezier(.52,.12,.14,1), width .46s cubic-bezier(.52,.12,.14,1), opacity .3s ease}
  .fnav-hl.ready{opacity:1}
  .fnav.hide{opacity:0;pointer-events:none;transform:translateY(10px)}
  .fnav{transition:opacity .25s, transform .25s}
  /* Detached round timer button — same frosted style as the tab bar */
  .fab-timer{width:56px;height:56px;flex:none;border-radius:50%;border:0;cursor:pointer;
    -webkit-tap-highlight-color:transparent;background:rgba(252,250,246,.5);
    -webkit-backdrop-filter:blur(30px) saturate(1.9);backdrop-filter:blur(30px) saturate(1.9);
    border:1px solid rgba(255,255,255,.55);
    box-shadow:0 14px 32px -16px rgba(40,24,12,.4), 0 1px 0 rgba(255,255,255,.75) inset;
    color:rgba(30,22,16,.56);display:grid;place-items:center;
    transition:opacity .25s, transform .25s, color .2s ease, background .2s ease}
  .fab-timer svg{width:22px;height:22px}
  .fab-timer-ic{width:40px;height:40px;background:currentColor;
    -webkit-mask:url(assets/icons/Timer.png) center/contain no-repeat;
    mask:url(assets/icons/Timer.png) center/contain no-repeat}
  .fab-timer:hover{color:rgba(30,22,16,.9)}
  .fab-timer:active{transform:scale(.93)}
  .fnav.hide ~ .fab-timer{opacity:0;pointer-events:none;transform:translateY(10px)}
  .tmr-ttl{flex:1;font-family:var(--cond);text-transform:uppercase;letter-spacing:.06em;
    font-size:15px;font-weight:800;color:var(--ink)}
  .tmr-body{display:flex;flex-direction:column;justify-content:center}
  /* ===== Fullscreen Oefentimer ===== */
  .timerscreen{color:#fff}
  .timerscreen .shead{position:relative;z-index:7;justify-content:space-between;align-items:center;gap:12px}
  .tmr-eye{flex:1;font-family:var(--cond);text-transform:uppercase;letter-spacing:.14em;
    font-size:12.5px;font-weight:700;color:rgba(255,255,255,.92)}
  .tmr-eye .ko{opacity:.72;font-weight:600;margin-left:3px}
  /* Screen-wide tap zone to start/pause — sits above the dial but below the top X (z7) and the
     bottom controls (.ot-bar z6), so those stay clickable while the rest of the screen starts/pauses */
  .timerscreen .ot-tap{position:absolute;inset:0;z-index:4;cursor:pointer;background:transparent}
  /* Quiet close button — no glass, just a calm icon (keeps the 56px hit target) */
  .timerscreen .shead .sx{width:56px;height:56px;flex:none;border-radius:50%;
    background:transparent;border:0;color:rgba(255,255,255,.9);
    display:grid;place-items:center;transition:transform .16s ease, background .2s ease, color .2s ease}
  .timerscreen .shead .sx:hover{background:rgba(255,255,255,.10);color:#fff}
  .timerscreen .shead .sx:active{transform:scale(.9)}
  .timerscreen .shead .sx svg{width:22px;height:22px}
  .timerscreen .sbody{position:relative;z-index:2;overflow:hidden;
    padding:0 24px calc(env(safe-area-inset-bottom) + 150px);display:flex;flex-direction:column;justify-content:center}
  /* Bigger dial for emphasis */
  .timerscreen .pt-svg{width:300px;height:300px}
  /* Counter uses the lexicon Korean display face (Black Han Sans) */
  .timerscreen .pt-num{font-family:var(--kor);font-size:120px;line-height:.9;font-weight:400;display:flex;align-items:center;justify-content:center;height:108px}
  .timerscreen .pt-word{margin-top:4px;gap:10px}
  .timerscreen .pt-word .w-ko{font-family:var(--kor);font-size:32px;font-weight:400}
  .timerscreen .pt-word .w-ro{font-size:15px}
  /* Only number + character + romanisation live inside the ring; hint sits BELOW it */
  .timerscreen .ptimer.bare{justify-content:center;align-items:center;gap:24px;padding:0}
  .timerscreen .pt-dial{flex:none;margin:0}
  .timerscreen .pt-hint{margin-top:0;font-size:12px;letter-spacing:.14em}
  /* Circular soft light orbs — bigger, softer, and arranged per element (see [data-el] below) */
  .timerscreen .pt-bg{background:linear-gradient(158deg, var(--el) 4%, var(--deep) 60%, var(--elink) 128%);filter:saturate(1.06)}
  .timerscreen .pt-orbs{position:absolute;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
  .timerscreen .orb{position:absolute;border-radius:50%;filter:blur(24px);opacity:.55;will-change:transform}
  .timerscreen .orb.o1{width:360px;height:360px;left:-78px;top:-2%;background:radial-gradient(circle at 50% 50%, var(--glow), transparent 70%)}
  .timerscreen .orb.o2{width:440px;height:440px;right:-120px;bottom:-8%;background:radial-gradient(circle at 50% 50%, rgba(255,255,255,.18), transparent 70%)}
  .timerscreen .orb.o3{width:300px;height:300px;right:2%;top:12%;background:radial-gradient(circle at 50% 50%, var(--hot), transparent 72%)}
  /* Element character: air rises (heaven/wind), heat & thunder pool low, earth/mountain sit heavy,
     water/lake stay balanced & cool. Colours already come from the theme; here we shape the light. */
  .timerscreen[data-el="il"] .orb.o1,.timerscreen[data-el="o"] .orb.o1{top:-10%;left:-60px;width:400px;height:400px}
  .timerscreen[data-el="il"] .orb.o3,.timerscreen[data-el="o"] .orb.o3{top:3%;opacity:.5}
  .timerscreen[data-el="il"] .orb.o2,.timerscreen[data-el="o"] .orb.o2{bottom:-20%;opacity:.42}
  .timerscreen[data-el="sam"] .orb.o3,.timerscreen[data-el="sa"] .orb.o3{top:auto;bottom:-6%;right:-6%;width:360px;height:360px;opacity:.62}
  .timerscreen[data-el="sam"] .orb.o1,.timerscreen[data-el="sa"] .orb.o1{top:auto;bottom:4%;left:-96px}
  .timerscreen[data-el="chil"] .orb.o2,.timerscreen[data-el="pal"] .orb.o2{width:500px;height:500px;bottom:-18%;opacity:.5}
  .timerscreen[data-el="chil"] .orb.o1,.timerscreen[data-el="pal"] .orb.o1{top:auto;bottom:0}
  .timerscreen[data-el="chil"] .orb.o3,.timerscreen[data-el="pal"] .orb.o3{top:auto;bottom:22%;opacity:.42}
  .timerscreen[data-el="yuk"] .orb.o3,.timerscreen[data-el="i"] .orb.o3{top:20%;opacity:.5}
  .timerscreen[data-el="yuk"] .orb.o1,.timerscreen[data-el="i"] .orb.o1{top:6%}
  .timerscreen .orb{animation:orbFloat 12s ease-in-out infinite}
  .timerscreen .orb.o2{animation-duration:16s;animation-direction:reverse}
  .timerscreen .orb.o3{animation-duration:14s;animation-delay:-3s}
  @keyframes orbFloat{0%{transform:translate(0,0)}33%{transform:translate(16px,-20px)}66%{transform:translate(-13px,13px)}100%{transform:translate(0,0)}}
  /* Celebratory mascot that slides up from the bottom when a set completes; sits ABOVE the dial
     but BEHIND the playback controls (.ot-bar z6) for depth. Two stacked images (open eyes + blink)
     let it blink while it rests at the counter ring, then it slides back down. */
  .ot-mascot{position:absolute;left:0;right:0;bottom:0;z-index:5;display:flex;justify-content:center;
    align-items:flex-end;pointer-events:none;transform:translateY(100%)}
  .ot-masc-face{position:relative;width:340px;max-width:90%;filter:drop-shadow(0 12px 26px rgba(0,0,0,.32))}
  .ot-masc-face img{display:block;width:100%;height:auto}
  .ot-masc-face .ot-blink{position:absolute;top:0;left:0;opacity:0}
  .ot-mascot.peek{animation:otPeek 3.1s cubic-bezier(.22,1,.36,1) forwards}
  .ot-mascot.peek .ot-blink{animation:otBlink 3.1s linear forwards}
  @keyframes otPeek{0%{transform:translateY(100%)}26%{transform:translateY(44%)}34%{transform:translateY(39%)}
    80%{transform:translateY(39%)}100%{transform:translateY(100%)}}
  @keyframes otBlink{0%,40%{opacity:0}42%,45%{opacity:1}47%,58%{opacity:0}60%,63%{opacity:1}65%,100%{opacity:0}}
  .ptimer.bare{background:transparent;box-shadow:none;border-radius:0;margin:0;min-height:0;flex:1;padding:6px 0 0}
  .pt-num.pop{animation:otpop .42s cubic-bezier(.34,1.5,.45,1)}
  @keyframes otpop{0%{transform:scale(.55);opacity:.25}55%{transform:scale(1.14)}100%{transform:scale(1);opacity:1}}
  .ptimer.ready .pt-num{text-shadow:0 3px 26px rgba(255,255,255,.4)}
  .timerscreen .ot-dots{display:inline-flex;gap:15px;align-items:center;justify-content:center;line-height:1}
  .timerscreen .rd{width:20px;height:20px;border-radius:50%;background:#fff;
    transition:background-color .5s ease, transform .5s ease;will-change:background-color,transform}
  .timerscreen .rd.off{background:rgba(255,255,255,.22);transform:scale(.8)}
  .ptimer.ready .pt-prog{opacity:.45}
  .tempo.open .tf-opt:nth-child(4){animation-delay:.15s}

  /* ---------- Session overlay ---------- */
  .session{position:absolute;inset:0;z-index:90;background:var(--page);display:flex;flex-direction:column;
    transform:translateY(100%);transition:transform .38s cubic-bezier(.32,.72,0,1)}
  .session.show{transform:translateY(0)}
  /* Oefentimer materialises (fade + gentle scale) instead of sliding up as a card */
  .session.timerscreen{transform:scale(1.04);opacity:0;
    transition:opacity .3s ease, transform .44s cubic-bezier(.33,1,.5,1)}
  .session.timerscreen.show{transform:scale(1);opacity:1}
  .shead{padding:calc(env(safe-area-inset-top) + 16px) 20px 12px;display:flex;align-items:center;gap:14px}
  .shead .sx{width:40px;height:40px;flex:none;border-radius:50%;border:1px solid var(--line);background:var(--surface);
    color:var(--gray);display:grid;place-items:center;order:9;margin-left:2px}
  .shead .sx svg{width:17px;height:17px}
  .sprog{flex:1;height:7px;border-radius:4px;background:var(--soft);overflow:hidden}
  .sprog i{display:block;height:100%;width:0;border-radius:4px;background:linear-gradient(90deg,var(--el),var(--deep));
    transition:width .45s cubic-bezier(.4,0,.1,1)}
  .sstep{font-family:var(--cond);text-transform:uppercase;font-size:11.5px;letter-spacing:.06em;color:var(--gray);
    flex:none;min-width:34px;text-align:right}
  .sbody{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding:6px 24px 20px}
  .sbody::-webkit-scrollbar{display:none}
  .sfoot{padding:12px 22px calc(env(safe-area-inset-bottom) + 20px);background:linear-gradient(transparent,var(--page) 26%)}
  .nextbtn{width:100%;border:0;border-radius:16px;background:var(--el);color:#fff;
    font-family:var(--cond);text-transform:uppercase;font-weight:800;letter-spacing:.03em;font-size:17px;padding:17px;
    display:flex;align-items:center;justify-content:center;gap:10px;transition:transform .12s, filter .12s;
    box-shadow:0 14px 26px -16px var(--el)}
  .nextbtn:active{transform:scale(.98);filter:brightness(.97)}
  .nextbtn.ghost{background:var(--surface);color:var(--ink);border:1px solid var(--line);box-shadow:none}
  .nextbtn svg{width:19px;height:19px}
  .stepin{animation:stepin .42s cubic-bezier(.32,.72,0,1) both}
  @keyframes stepin{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  /* step: intro (cinematic) */
  .s-intro{border-radius:24px;overflow:hidden;color:#fff;position:relative;padding:30px 24px 28px;margin-top:8px;
    background:radial-gradient(130% 100% at 84% 2%, rgba(255,255,255,.15), transparent 55%),
      linear-gradient(158deg, var(--el) 0%, var(--deep) 70%, var(--elink) 130%);isolation:isolate}
  .s-intro .fwm{position:absolute;right:-6px;top:50%;transform:translateY(-50%);
    font-family:var(--kor);
    font-weight:800;font-size:188px;line-height:1;color:rgba(255,255,255,.10);z-index:-1;user-select:none}
  .s-intro .trigbox{width:60px;height:60px;border-radius:16px;display:grid;place-items:center;margin-bottom:18px;
    background:linear-gradient(150deg, rgba(255,255,255,.22), rgba(255,255,255,.05));border:1px solid rgba(255,255,255,.24)}
  .s-intro .trigbox svg{width:34px;height:34px;color:#fff}
  .s-intro .ieye{font-family:var(--cond);text-transform:uppercase;letter-spacing:.18em;font-size:11.5px;
    color:rgba(255,255,255,.8);margin-bottom:8px}
  .s-intro h1{font-family:var(--cond);text-transform:uppercase;font-weight:800;font-size:40px;line-height:.92;
    letter-spacing:-.01em;margin:0 0 12px}
  .s-intro .isub{font-size:15.5px;line-height:1.5;color:rgba(255,255,255,.9);max-width:28ch}
  .s-plan{margin-top:22px}
  .s-plan .pi{display:flex;align-items:center;gap:13px;padding:12px 2px}
  .s-plan .pi + .pi{border-top:1px solid var(--line)}
  .s-plan .pn{width:26px;height:26px;flex:none;border-radius:8px;background:var(--tint);color:var(--deep);
    display:grid;place-items:center;font-family:var(--cond);font-weight:700;font-size:14px}
  .s-plan .pt{font-size:14.5px;font-weight:600;color:#2A3342}
  .s-plan .pt small{display:block;font-weight:500;color:var(--gray);font-size:12.5px}

  /* generic step heading */
  .sh{margin:14px 2px 4px}
  .sh .k{font-family:var(--cond);text-transform:uppercase;letter-spacing:.14em;font-size:12px;color:var(--el);font-weight:700}
  .sh h2{font-family:var(--cond);text-transform:uppercase;font-weight:800;font-size:29px;line-height:1;letter-spacing:-.01em;
    margin:7px 0 0;color:var(--ink)}
  .sh p.sub{color:var(--gray);font-size:14px;margin:9px 0 0;line-height:1.5}

  /* meaning / lead */
  .lead{font-size:17px;line-height:1.62;color:#26303E;margin:18px 0 0}
  .lead .drop{float:left;font-family:var(--poster);font-size:62px;line-height:.66;padding:8px 13px 0 0;color:var(--el)}
  .kpt{margin-top:20px;background:var(--tint);border:1px solid var(--elline);border-radius:16px;padding:15px 17px}
  .kpt .kl{font-family:var(--cond);text-transform:uppercase;letter-spacing:.1em;font-size:11px;color:var(--deep);margin-bottom:5px}
  .kpt .kv{font-size:15.5px;line-height:1.45;font-weight:600;color:#2A3342}

  /* focus list */
  ul.flist{list-style:none;margin:20px 0 0;padding:0}
  ul.flist li{display:flex;gap:13px;align-items:flex-start;padding:14px 0;font-size:16px;color:#2A3342;line-height:1.4}
  ul.flist li + li{border-top:1px solid var(--line)}
  ul.flist li.main{background:var(--tint);border:1px solid var(--elline);border-radius:14px;padding:15px 16px;margin-bottom:6px}
  ul.flist li.main + li{border-top:0}
  ul.flist .sq{width:9px;height:9px;flex:none;margin-top:6px;border-radius:2px;background:var(--el)}
  ul.flist li.main .sq{width:11px;height:11px}
  ul.flist .mtag{display:block;font-family:var(--cond);text-transform:uppercase;font-size:10.5px;letter-spacing:.1em;
    color:var(--deep);font-weight:700;margin-bottom:3px}

  /* technique card */
  .tcard{display:flex;align-items:center;gap:15px;background:var(--surface);border:1px solid var(--line);
    border-radius:18px;padding:18px;margin-top:20px}
  .tcard .txt{flex:1;min-width:0}
  .tcard .han{font-size:26px;font-weight:700;letter-spacing:-.01em;line-height:1.15;color:var(--ink)}
  .tcard .rom{font-size:16px;font-weight:700;color:var(--ink);margin-top:3px}
  .tcard .nl{font-size:13.5px;color:var(--gray);margin-top:1px}
  .spk{width:50px;height:50px;flex:none;border-radius:14px;border:0;background:var(--tint);color:var(--deep);
    display:grid;place-items:center;transition:transform .12s}
  .spk:active{transform:scale(.92)}
  .spk svg{width:23px;height:23px}
  .spk.ring{animation:ring 1s ease infinite}
  @keyframes ring{0%{box-shadow:0 0 0 0 var(--elline)}70%{box-shadow:0 0 0 12px transparent}100%{box-shadow:0 0 0 0 transparent}}
  .thint{margin-top:14px;font-size:14px;color:var(--gray);line-height:1.5}

  /* warmup counting — now the fullscreen teller (.ptimer.teller), styled below */
  .playrow{display:flex;align-items:center;gap:12px;margin-top:20px}
  .playrow button{border:0;background:var(--ink);color:#fff;border-radius:13px;padding:13px 18px;
    font-family:var(--cond);text-transform:uppercase;font-weight:700;font-size:14px;letter-spacing:.03em;
    display:inline-flex;align-items:center;gap:9px}
  .playrow button svg{width:17px;height:17px}
  .playrow small{color:var(--gray);font-size:12.5px}

  /* flashcard (onthoud) */
  .flip{margin-top:22px;perspective:1200px;height:230px;cursor:pointer}
  .flip-in{position:relative;width:100%;height:100%;transition:transform .5s cubic-bezier(.32,.72,0,1);
    transform-style:preserve-3d}
  .flip.flipped .flip-in{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;border-radius:22px;backface-visibility:hidden;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:24px}
  .face.front{background:var(--surface);border:1px solid var(--line)}
  .face.front .fl{font-family:var(--cond);text-transform:uppercase;letter-spacing:.1em;font-size:11px;color:var(--gray);margin-bottom:12px}
  .face.front .fw{font-size:24px;font-weight:700;color:var(--ink);line-height:1.3}
  .face.front .tap{margin-top:16px;font-size:12.5px;color:var(--el);font-family:var(--cond);text-transform:uppercase;letter-spacing:.06em}
  .face.back{background:linear-gradient(152deg,var(--el),var(--deep));color:#fff;transform:rotateY(180deg)}
  .face.back .bh{font-size:34px;font-weight:700;line-height:1.1}
  .face.back .br{font-size:16px;font-weight:600;margin-top:6px;color:rgba(255,255,255,.9)}
  .face.back .spk{margin-top:16px;background:rgba(255,255,255,.18);color:#fff}

  /* check (quiz) */
  .opts{margin-top:22px;display:grid;gap:11px}
  .opt{display:flex;align-items:center;gap:13px;width:100%;text-align:left;background:var(--surface);
    border:1.5px solid var(--line);border-radius:15px;padding:16px 17px;font-size:15.5px;font-weight:600;color:var(--ink);
    transition:.16s}
  .opt .ol{width:26px;height:26px;flex:none;border-radius:8px;background:var(--soft);color:var(--gray);
    display:grid;place-items:center;font-family:var(--cond);font-weight:700;font-size:14px}
  .opt.correct{border-color:#12B76A;background:#ECFDF3}
  .opt.correct .ol{background:#12B76A;color:#fff}
  .opt.wrong{border-color:#F04438;background:#FEF3F2}
  .opt.wrong .ol{background:#F04438;color:#fff}
  .opt.correct{animation:pop .4s cubic-bezier(.34,1.56,.64,1)}
  .opt.wrong{animation:shake .4s}
  @keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.03)}100%{transform:scale(1)}}
  @keyframes shake{10%,90%{transform:translateX(-1px)}30%,70%{transform:translateX(4px)}50%{transform:translateX(-6px)}}
  .why{margin-top:16px;background:var(--tint);border:1px solid var(--elline);border-radius:14px;padding:14px 16px;
    font-size:14.5px;color:#2A3342;line-height:1.5;display:none}
  .why.show{display:block;animation:stepin .35s both}

  /* ---- Proefexamen (meerkeuze-examen) ---- */
  .exam .ex-meta{display:flex;align-items:center;gap:8px;margin:14px 2px 0}
  .ex-chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--cond);text-transform:uppercase;
    letter-spacing:.04em;font-size:12px;font-weight:700;padding:5px 10px;border-radius:999px;line-height:1}
  .ex-chip b{font-weight:800}
  .ex-chip svg{width:13px;height:13px}
  .ex-chip.ok{background:#ECFDF3;color:#12B76A}
  .ex-chip.bad{background:var(--soft);color:var(--gray)}
  .ex-cat{margin-left:auto;font-family:var(--cond);text-transform:uppercase;letter-spacing:.1em;
    font-size:10.5px;color:var(--gray)}
  .ex-q{margin-top:14px;font-size:18px;font-weight:600;color:var(--ink);line-height:1.4}
  .exam .opts{margin-top:16px}
  .ex-result{text-align:center;padding:26px 8px 0}
  .ex-mascot{width:172px;height:auto;margin:0 auto -6px;display:block;filter:drop-shadow(0 12px 20px rgba(0,0,0,.14))}
  .ex-flags{width:100%;max-width:320px;height:auto;margin:22px auto 0;display:block}
  .ex-badge{width:78px;height:78px;margin:0 auto;border-radius:50%;display:grid;place-items:center;font-size:34px}
  .ex-badge svg{width:40px;height:40px}
  .ex-result.pass .ex-badge{background:#ECFDF3;color:#12B76A}
  .ex-result.fail .ex-badge{background:var(--soft);color:var(--gray)}
  .ex-rk{margin-top:16px;font-family:var(--cond);text-transform:uppercase;letter-spacing:.16em;font-size:12px;color:var(--gray)}
  .ex-rt{font-family:var(--cond);text-transform:uppercase;font-weight:800;font-size:40px;line-height:1;margin:8px 0 0;color:var(--ink)}
  .ex-rs{max-width:300px;margin:14px auto 0;font-size:14.5px;line-height:1.5;color:var(--gray)}
  .ex-scorebar{max-width:220px;height:8px;border-radius:5px;background:var(--soft);overflow:hidden;margin:20px auto 0}
  .ex-scorebar i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,var(--el),var(--deep))}

  /* done */
  .done{text-align:center;padding:20px 6px 0}
  .stampwrap{position:relative;width:150px;height:150px;margin:6px auto 0}
  .stamp-ring{position:absolute;inset:0}
  .stamp-ring svg{transform:rotate(-90deg)}
  .stamp-ring .rc{stroke:var(--line)}
  .stamp-ring .rf{stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.1,1)}
  .stampseal{position:absolute;inset:0;display:grid;place-items:center;opacity:0}
  .stampseal.pressed{animation:stamp .5s cubic-bezier(.3,1.3,.5,1) forwards}
  @keyframes stamp{0%{opacity:0;transform:scale(1.7) rotate(-11deg)}
    55%{opacity:1;transform:scale(.9) rotate(3deg)}
    72%{transform:scale(1.04) rotate(-1.5deg)}100%{opacity:1;transform:scale(1) rotate(-2deg)}}
  .donek{margin:22px 0 0;text-transform:uppercase;letter-spacing:.18em;font-size:11px;color:var(--gray)}
  .done h1{font-family:var(--cond);text-transform:uppercase;font-weight:800;font-size:34px;margin:8px 0 0;color:var(--ink)}
  .done .dl{font-size:15.5px;color:#4A4438;margin:12px auto 0;max-width:30ch;line-height:1.55}
  .done .dl b{color:var(--ink)}
  .streakup{display:inline-flex;align-items:center;gap:9px;margin-top:20px;background:rgba(240,82,43,.17);color:var(--el);
    border:1px solid rgba(240,82,43,.28);
    border-radius:999px;padding:11px 18px;font-family:var(--cond);text-transform:uppercase;font-weight:700;font-size:15px}
  .streakup .fl{font-size:18px}
  .tmrw{margin-top:22px;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px 17px;
    display:flex;align-items:center;gap:14px;text-align:left}
  .tmrw .tm-ic{width:42px;height:42px;flex:none;border-radius:12px;display:grid;place-items:center;color:#fff;
    background:linear-gradient(150deg,var(--nx-el,#8B45E6),var(--nx-deep,#5A1E9E))}
  .tmrw .tm-ic svg{width:24px;height:24px}
  .tmrw .tm-t{flex:1}
  .tmrw .tm-t small{font-family:var(--cond);text-transform:uppercase;letter-spacing:.08em;font-size:10.5px;color:var(--gray)}
  .tmrw .tm-t b{display:block;font-size:16px;color:var(--ink);font-family:var(--cond);text-transform:uppercase;margin-top:2px}

  /* confetti */
  .confetti{position:absolute;inset:0;z-index:100;pointer-events:none;overflow:hidden}
  .confetti i{position:absolute;top:-14px;width:9px;height:14px;border-radius:2px;opacity:.95;
    animation:fall 1.9s cubic-bezier(.2,.6,.4,1) forwards}
  @keyframes fall{to{transform:translateY(900px) rotate(var(--r));opacity:0}}

  /* ---- Weekly check-in (personalisation) ---- */
  .checkin{display:flex;align-items:center;gap:14px;margin-top:16px;border-radius:18px;padding:14px 16px;cursor:pointer;
    background:var(--surface);border:1px solid var(--line);transition:transform .12s}
  .checkin:active{transform:scale(.99)}
  .checkin .ci-ic{width:42px;height:42px;flex:none;border-radius:12px;display:grid;place-items:center;
    background:var(--soft);color:var(--gray)}
  .checkin .ci-ic svg{width:22px;height:22px}
  .checkin .ci-t{flex:1;min-width:0}
  .checkin .ci-t small{display:inline-flex;align-items:center;gap:5px;font-family:var(--cond);text-transform:uppercase;letter-spacing:.08em;
    font-size:10.5px;color:var(--gray)}
  .checkin .ci-t small svg{width:13px;height:13px;color:var(--el);flex:none}
  .checkin .ci-t small .ci-compass{width:14px;height:14px;flex:none;background:var(--el);
    -webkit-mask:url(assets/icons/Compass2.png) center/contain no-repeat;
    mask:url(assets/icons/Compass2.png) center/contain no-repeat}
  .checkin .ci-t b{display:block;font-size:15px;color:var(--ink);margin-top:2px;font-weight:600;line-height:1.3}
  .checkin .ci-cta{font-family:var(--cond);text-transform:uppercase;letter-spacing:.05em;font-size:12px;color:var(--gray);
    display:inline-flex;align-items:center;gap:4px;flex:none}
  .checkin .ci-cta svg{width:14px;height:14px}
  .ci-wrap{position:relative;margin-top:36px}
  .ci-wrap .checkin{margin-top:0;margin-left:44px}
  .ci-masc{position:absolute;left:0;bottom:-2px;width:56px;height:auto;z-index:2;pointer-events:none;
    filter:drop-shadow(0 3px 5px rgba(0,0,0,.16))}
  .checkin .dot{width:9px;height:9px;border-radius:50%;background:var(--el);flex:none;animation:blink 1.6s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

  /* ---- Daily challenges (dagdoel) ---- */
  .eye .cnt{font-family:var(--cond);font-weight:700;font-size:12.5px;color:var(--gray)}
  .dagdoel{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:4px 16px}
  .dd-row{display:flex;align-items:center;gap:13px;padding:13px 0;cursor:pointer;text-align:left}
  .dd-row + .dd-row{border-top:1px solid var(--line)}
  .dd-ck{width:26px;height:26px;flex:none;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;
    color:#fff;transition:.16s}
  .dd-ck svg{width:15px;height:15px;opacity:0;transform:scale(.5);transition:.2s cubic-bezier(.34,1.56,.64,1)}
  .dd-row.done .dd-ck{background:#12B76A;border-color:#12B76A}
  .dd-row.done .dd-ck svg{opacity:1;transform:none}
  .dd-l{flex:1;font-size:14.5px;font-weight:600;color:var(--ink)}
  .dd-l small{display:block;color:var(--gray);font-weight:500;font-size:12px;margin-top:1px}
  .dd-row.done .ddt,.dd-row.done .dd-l small{text-decoration:line-through;color:var(--gray)}
  .dd-chev{color:#CBD2DE}
  .dd-chev svg{width:18px;height:18px}
  .dd-banner{margin-top:10px;background:var(--tint);border:1px solid var(--elline);border-radius:13px;padding:12px 14px;
    font-size:13.5px;font-weight:700;color:var(--deep);text-align:center;font-family:var(--cond);text-transform:uppercase;letter-spacing:.03em}

  /* ---- Training van vandaag — coloured element hero + missie-kolommen ---- */
  .trainday{position:relative;margin-top:22px;border-radius:26px;overflow:hidden;color:#fff;isolation:isolate;
    display:flex;flex-direction:column;min-height:300px;
    background:
      radial-gradient(130% 100% at 88% 4%, rgba(255,255,255,.16), transparent 55%),
      linear-gradient(152deg, var(--el) 0%, var(--deep) 92%);
    box-shadow:0 20px 40px -26px rgba(16,24,40,.5);padding:26px 22px 20px}
  .trainday::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.18;mix-blend-mode:overlay;
    background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="140" height="140"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter><rect width="140" height="140" filter="url(%23n)" opacity="0.5"/></svg>')}
  .td-wm{position:absolute;right:-26px;top:50%;transform:translateY(-50%);height:122%;width:auto;
    opacity:.16;pointer-events:none;user-select:none;z-index:-1}
  .td-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:22px}
  .td-title{font-family:var(--cond);text-transform:uppercase;font-weight:800;font-size:20px;line-height:1;letter-spacing:.01em}
  .td-count{flex:none;font-family:var(--cond);text-transform:uppercase;letter-spacing:.06em;font-size:11.5px;font-weight:700;
    color:rgba(255,255,255,.72);line-height:1}
  .td-goal{font-size:14px;line-height:1.42;color:rgba(255,255,255,.94);margin:0 0 2px}
  .td-goal b{font-weight:800}
  .td-list{display:flex;flex-direction:column;flex:1;justify-content:center}
  .td-item{display:flex;align-items:center;gap:16px;width:100%;background:transparent;border:0;color:#fff;
    cursor:pointer;text-align:left;padding:12px 2px;-webkit-tap-highlight-color:transparent;
    transition:opacity .2s, transform .12s}
  .td-item:active{transform:scale(.99)}
  /* sleek to-do: thin horizontal rule BETWEEN rows only (not above first / below last) */
  .td-item + .td-item{border-top:1px solid rgba(255,255,255,.18)}
  .ti-n{font-family:var(--cond);font-weight:800;font-size:30px;line-height:1;font-variant-numeric:tabular-nums;
    min-width:32px;text-align:center;color:rgba(255,255,255,.9)}
  .ti-txt{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
  .ti-t{font-family:var(--cond);text-transform:uppercase;letter-spacing:.02em;font-weight:800;font-size:15.5px;line-height:1.05;
    align-self:flex-start;position:relative}
  .ti-s{font-size:12.5px;color:rgba(255,255,255,.72);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ti-ck{flex:none;position:relative;width:27px;height:27px;border-radius:50%;border:1.8px solid rgba(255,255,255,.5);
    display:grid;place-items:center;color:transparent;transition:background .18s, border-color .18s, color .18s}
  .ti-ck svg{width:15px;height:15px}
  /* hand-drawn "hit" burst that pops around the checkbox on complete */
  .hit-pop{position:absolute;left:-16px;top:-12px;width:18px;height:14px;pointer-events:none;z-index:6;opacity:0;
    --hsc:1;--hrot:-20deg;--hdx:0px;--hdy:0px;
    transform:translate(var(--hdx),var(--hdy)) scale(calc(.4*var(--hsc))) rotate(var(--hrot));transform-origin:top left;background:#FFFDFA;
    -webkit-mask:var(--hit,url(assets/icons/hit-burst.png)) center/contain no-repeat;
            mask:var(--hit,url(assets/icons/hit-burst.png)) center/contain no-repeat;
    animation:hitPop .5s cubic-bezier(.2,.7,.3,1) forwards}
  .hit-pop.hp-star{width:16px;height:18px;left:-14px;top:-16px;--hrot:0deg}
  .hit-pop.hp-sparkle{width:14px;height:17px;left:-12px;top:-15px;--hrot:0deg}
  .hit-pop.hp-stripes{width:17px;height:16px;left:-15px;top:-14px;--hrot:0deg}
  .hit-pop.hp-chevrons{width:16px;height:17px;left:-14px;top:-18px;--hrot:10deg}
  .hit-pop.hp-rays{width:16px;height:17px;left:-14px;top:-15px;--hrot:-30deg}
  @keyframes hitPop{
    0%{opacity:0;transform:translate(var(--hdx),var(--hdy)) scale(calc(.4*var(--hsc))) rotate(calc(var(--hrot) - 14deg))}
    30%{opacity:1;transform:translate(var(--hdx),var(--hdy)) scale(calc(1.15*var(--hsc))) rotate(var(--hrot))}
    60%{opacity:1;transform:translate(var(--hdx),var(--hdy)) scale(calc(1*var(--hsc))) rotate(var(--hrot))}
    100%{opacity:0;transform:translate(var(--hdx),var(--hdy)) scale(calc(1.08*var(--hsc))) rotate(var(--hrot))}}
  /* exam row launches instead of toggling → play affordance */
  .ti-go{flex:none;width:27px;height:27px;border-radius:50%;background:rgba(255,255,255,.2);
    display:grid;place-items:center;color:#fff}
  .ti-go svg{width:12px;height:12px;margin-left:1px}
  .td-item.done .ti-ck{background:#fff;border-color:#fff;color:var(--accent,var(--deep))}
  .td-item.done .ti-n{opacity:.5}
  .td-item.done .ti-t{opacity:.7}
  .td-item.done .ti-t::after{content:'';position:absolute;left:-6px;right:-9px;top:50%;height:.92em;
    transform:translateY(-52%);pointer-events:none;background:var(--accent,#fff);
    -webkit-mask:var(--sk,url(assets/icons/strike-loop.png)) center/100% 100% no-repeat;
            mask:var(--sk,url(assets/icons/strike-loop.png)) center/100% 100% no-repeat}
  .td-item.done.just .ti-t::after{animation:strikeIn .36s cubic-bezier(.4,0,.2,1) both}
  @keyframes strikeIn{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0 0 0)}}
  .td-item.done .ti-s{opacity:.6}

  /* ---- Term van de dag ---- */
  .termcard{margin-top:16px;background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:15px 17px}
  .termcard .tc-k{font-family:var(--cond);text-transform:uppercase;letter-spacing:.1em;font-size:11px;color:var(--gray);
    display:flex;align-items:center;gap:7px;margin-bottom:11px}
  .termcard .tc-k svg{width:15px;height:15px;color:var(--el)}
  .termcard .tc-row{display:flex;align-items:center;gap:13px}
  .termcard .tc-txt{flex:1;min-width:0}
  .termcard .tc-ko{font-size:17px;font-weight:700;color:var(--ink);line-height:1.25}
  .termcard .tc-ro{font-size:13px;color:var(--gray);margin-top:2px}
  .spk.sm{width:42px;height:42px;border-radius:12px}
  .spk.sm svg{width:20px;height:20px}

  /* ---- Week-focus chip on training card ---- */
  .wfchip{display:inline-flex;align-items:center;gap:7px;margin-top:15px;background:rgba(255,255,255,.15);
    border:1px solid rgba(255,255,255,.24);border-radius:999px;padding:8px 14px;font-size:12.5px;font-weight:600;color:#fff}
  .wfchip .em{font-size:14px}

  /* ---- Reflection overlay ---- */
  .rate{display:grid;gap:11px;margin-top:22px}
  .rate button{display:flex;align-items:center;gap:15px;background:var(--surface);border:1.5px solid var(--line);
    border-radius:16px;padding:16px 18px;font-size:16.5px;font-weight:600;color:var(--ink);text-align:left;transition:.16s}
  .rate button .em{font-size:26px;line-height:1;transition:transform .16s}
  .rate button.sel{border-color:var(--el);background:var(--tint)}
  .rate button.sel .em{transform:scale(1.12)}
  .fchips{display:flex;flex-wrap:wrap;gap:11px;margin-top:22px}
  .fchip{display:inline-flex;align-items:center;gap:9px;background:var(--surface);border:1.5px solid var(--line);
    border-radius:14px;padding:13px 16px;font-size:15px;font-weight:600;color:var(--ink);transition:.16s}
  .fchip .fe{font-size:17px}
  .fchip .fck{width:18px;height:18px;border-radius:50%;background:var(--el);display:none;place-items:center;color:#fff}
  .fchip .fck svg{width:11px;height:11px}
  .fchip.on{border-color:var(--el);background:var(--tint);color:var(--deep)}
  .fchip.on .fck{display:grid}
  .fchip:active{transform:scale(.96)}
  .rhint{margin-top:16px;font-size:13px;color:var(--gray);text-align:center}
  .rdone-ic{width:88px;height:88px;margin:14px auto 4px;border-radius:50%;display:grid;place-items:center;
    background:var(--tint);color:var(--el)}
  .rdone-ic svg{width:44px;height:44px}
  .rsummary{margin-top:18px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
  .rsummary .rs{background:var(--tint);border:1px solid var(--elline);border-radius:12px;padding:11px 15px;
    font-weight:700;color:var(--deep);font-size:15px}

  /* ===== Technique vocabulary ===== */
  .tveye{display:flex;align-items:center;gap:12px;margin:16px 2px 0;
    font-family:var(--cond);text-transform:uppercase;letter-spacing:.08em;font-size:12px;color:var(--gray)}
  .tveye .d{width:3px;height:3px;border-radius:50%;background:#CBC2B0}
  .tvlist{margin-top:10px}
  .tvgroup{margin-top:22px}
  .tvgroup:first-child{margin-top:14px}
  .tv-glabel{font-family:var(--cond);text-transform:uppercase;letter-spacing:.14em;font-size:12px;font-weight:700;
    color:var(--deep);margin:0 2px 4px;display:flex;align-items:center;gap:9px}
  .tv-glabel::after{content:"";flex:1;height:1px;background:var(--line)}
  .tvrow{display:flex;align-items:center;gap:14px;padding:15px 2px}
  .tvrow + .tvrow{border-top:1px solid var(--line)}
  .tvrow.isnew{background:var(--tint);border:1px solid var(--elline);border-radius:14px;padding:15px 16px;margin-top:6px}
  .tvrow.isnew + .tvrow{border-top:0}
  .tv-txt{flex:1;min-width:0}
  .tv-ko{font-size:19px;font-weight:700;color:var(--ink);line-height:1.2;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .tv-ro{font-size:13.5px;color:#8A8272;margin-top:3px;font-weight:600}
  .tv-nl{font-size:13.5px;color:var(--gray);margin-top:1px}
  .newtag{font-family:var(--cond);text-transform:uppercase;letter-spacing:.06em;font-size:10px;font-weight:700;
    color:#fff;background:var(--el);border-radius:999px;padding:2px 8px}

  /* ===== Crafted practice timer ===== */
  .ptimer{position:relative;margin:10px 0 2px;border-radius:30px;overflow:hidden;color:#fff;isolation:isolate;
    min-height:min(560px,66vh);display:flex;flex-direction:column;padding:26px 24px 24px;
    box-shadow:0 30px 60px -34px rgba(20,10,4,.6)}
  .pt-bg{position:absolute;inset:0;z-index:-2;
    background:
      radial-gradient(60% 46% at 24% 16%, var(--glow), transparent 62%),
      radial-gradient(66% 60% at 84% 84%, var(--elink), transparent 60%),
      radial-gradient(50% 40% at 70% 22%, var(--hot), transparent 60%),
      linear-gradient(158deg, var(--el) 6%, var(--deep) 68%, var(--elink) 130%);
    filter:saturate(1.06)}
  .pt-noise{position:absolute;inset:0;z-index:-1;opacity:.16;mix-blend-mode:overlay;pointer-events:none;
    background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="140" height="140"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter><rect width="140" height="140" filter="url(%23n)" opacity="0.5"/></svg>')}
  .pt-cloud{position:absolute;top:22px;right:20px;width:96px;color:rgba(255,255,255,.6);z-index:0}
  .pt-cloud .cloud{width:96px}
  .pt-head{position:relative;z-index:1}
  .pt-eye{font-family:var(--cond);text-transform:uppercase;letter-spacing:.18em;font-size:11.5px;color:rgba(255,255,255,.82)}
  .pt-form{display:block;font-family:var(--cond);text-transform:uppercase;font-weight:800;font-size:24px;line-height:1;margin-top:6px}
  .pt-dial{position:relative;flex:1;display:grid;place-items:center;margin:6px 0}
  .pt-svg{width:236px;height:236px;display:block;filter:drop-shadow(0 8px 20px rgba(0,0,0,.18))}
  .pt-track{stroke:rgba(255,255,255,.22);transform:rotate(-90deg);transform-origin:120px 120px}
  .pt-prog{stroke:#fff;transform:rotate(-90deg);transform-origin:120px 120px;
    transition:stroke-dashoffset .95s linear}
  .pt-knob{fill:#fff;filter:drop-shadow(0 0 6px rgba(255,255,255,.9))}
  /* Knob rides the fill: rotate the group so it stays locked to the progress edge */
  .pt-knobg{transform-box:view-box;transform-origin:120px 120px}
  .pt-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .pt-time{font-family:var(--cond);font-weight:800;font-size:58px;line-height:.9;letter-spacing:.01em;
    font-variant-numeric:tabular-nums}
  .pt-sub{margin-top:8px;font-family:var(--cond);text-transform:uppercase;letter-spacing:.14em;font-size:11px;
    color:rgba(255,255,255,.82)}
  .pt-ctrls{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;gap:20px}
  .pt-btn{border:0;display:grid;place-items:center;transition:transform .14s, background .2s}
  .pt-btn:active{transform:scale(.92)}
  .pt-btn.glass{width:58px;height:58px;border-radius:50%;color:#fff;
    background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.3);
    -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px)}
  .pt-btn.glass svg{width:24px;height:24px}
  .pt-btn.main{width:78px;height:78px;border-radius:50%;background:#fff;color:var(--deep);
    box-shadow:0 14px 30px -12px rgba(0,0,0,.5)}
  .pt-btn.main svg{width:32px;height:32px;margin-left:2px}
  .pt-btn.main.playing svg{margin-left:0}

  /* ===== Teller (Koreaans tellen) — reuses the .ptimer shell ===== */
  .ptimer.teller{cursor:pointer;-webkit-user-select:none;user-select:none}
  .teller .pt-ctrls{gap:22px}
  .pt-num{font-family:var(--cond);font-weight:800;font-size:80px;line-height:.82;letter-spacing:.01em;
    font-variant-numeric:tabular-nums}
  .pt-word{margin-top:13px;display:flex;align-items:baseline;justify-content:center;gap:9px}
  .pt-word .w-ko{font-size:23px;font-weight:700;line-height:1}
  .pt-word .w-dot{opacity:.5;font-size:15px;transform:translateY(-3px)}
  .pt-word .w-ro{font-family:var(--cond);text-transform:uppercase;letter-spacing:.09em;font-size:14px;
    color:rgba(255,255,255,.82)}
  .pt-hint{margin-top:16px;font-family:var(--cond);text-transform:uppercase;letter-spacing:.16em;font-size:11px;
    color:rgba(255,255,255,.7);transition:opacity .3s;min-height:14px}
  .pt-btn.glass.on{background:#fff;border-color:#fff;color:var(--deep)}
  /* unfolding tempo control */
  .tempo{position:relative;display:grid;place-items:center}
  .tempo .tempo-lbl{font-family:var(--cond);font-weight:800;font-size:19px;letter-spacing:.01em;line-height:1}
  .pt-btn.tempo-btn{width:auto;min-width:58px;height:58px;border-radius:29px;flex-direction:row;gap:9px;padding:0 22px}
  .tempo-name{font-family:var(--cond);text-transform:uppercase;letter-spacing:.11em;font-size:12.5px;opacity:.86;line-height:1}
  .tempo-fan{position:absolute;left:50%;bottom:calc(100% + 14px);z-index:6;
    display:flex;flex-direction:column;gap:6px;padding:8px;border-radius:22px;
    background:rgba(26,9,5,.34);border:1px solid rgba(255,255,255,.24);
    -webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);
    box-shadow:0 20px 46px -18px rgba(0,0,0,.7);
    opacity:0;visibility:hidden;transform:translateX(-50%) translateY(8px);transform-origin:bottom center;
    transition:opacity .18s ease, transform .18s ease, visibility .18s}
  .tempo.open .tempo-fan{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}
  .tempo.open .tf-opt{animation:tfin .34s cubic-bezier(.34,1.4,.5,1) both}
  .tempo.open .tf-opt:nth-child(2){animation-delay:.05s}
  .tempo.open .tf-opt:nth-child(3){animation-delay:.1s}
  @keyframes tfin{from{opacity:0;transform:translateY(9px) scale(.9)}to{opacity:1;transform:none}}
  .tf-opt{border:0;background:transparent;color:#fff;cursor:pointer;border-radius:15px;
    padding:9px 16px;display:flex;flex-direction:column;align-items:center;gap:1px;min-width:82px;
    transition:background .16s, transform .12s}
  .tf-opt:active{transform:scale(.93)}
  .tf-opt b{font-family:var(--cond);font-weight:800;font-size:18px;line-height:1.15}
  .tf-opt small{font-size:10px;text-transform:uppercase;letter-spacing:.09em;opacity:.72}
  .tf-opt.on{background:rgba(255,255,255,.92);color:var(--deep)}
  .tf-opt.on small{opacity:.75}

  /* ===== Oefentimer: horizontal control bar (reset+repeat grouped left, tempo right folding left) ===== */
  .ot-fab{width:56px;height:56px;flex:none;border-radius:50%;cursor:pointer;
    border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.13);color:#fff;
    -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
    box-shadow:0 14px 30px -16px rgba(0,0,0,.55);display:grid;place-items:center;
    transition:transform .16s cubic-bezier(.34,1.4,.4,1), background .24s ease, color .24s ease, border-color .24s ease}
  .ot-fab:active{transform:scale(.9)}
  .ot-fab svg{width:23px;height:23px}
  .ot-fab.on{background:#fff;border-color:#fff;color:var(--deep)}
  .ot-bar{position:absolute;left:22px;right:22px;bottom:calc(env(safe-area-inset-bottom) + 20px);z-index:6;
    display:flex;align-items:center;justify-content:space-between}
  .ot-left{display:flex;align-items:center;gap:12px}
  .ot-tempo{position:relative;width:56px;height:56px}
  .ot-tempo-fab{position:absolute;left:0;bottom:0;z-index:1;transition:opacity .16s ease}
  .ot-tempo-cur{font-family:var(--cond);font-weight:800;font-size:17px;line-height:1;letter-spacing:.02em;
    display:inline-flex;align-items:center;gap:2px}
  .ot-tempo-cur .ot-tx,.ot-topt .ot-tx{font-size:.94em}
  .ot-topt .ot-tlab{display:inline-flex;align-items:center;gap:2px}
  /* Diagonal fraction (¹ ⁄ ₄) rebuilt from parts so the slash gets real breathing room left & right */
  .timerscreen .ot-fr{display:inline-block;white-space:nowrap;letter-spacing:0;font-weight:800}
  .timerscreen .ot-fr sup,.timerscreen .ot-fr sub{font-size:.72em;font-weight:800}
  .timerscreen .ot-fr .sl{font-weight:500;margin:0 .18em}
  .ot-tempo.open .ot-tempo-fab{opacity:0;pointer-events:none}
  /* Fold-out pill: same height as the button, grows RIGHTWARD from the left edge; ROUND option thumbs */
  .ot-tmenu{position:absolute;left:0;bottom:0;height:56px;width:56px;z-index:2;overflow:hidden;
    display:flex;align-items:center;justify-content:flex-start;padding:6px;box-sizing:border-box;
    border-radius:28px;background:rgba(16,8,4,.52);border:1px solid rgba(255,255,255,.24);
    -webkit-backdrop-filter:blur(20px) saturate(1.4);backdrop-filter:blur(20px) saturate(1.4);
    box-shadow:0 18px 44px -16px rgba(0,0,0,.72);
    opacity:0;visibility:hidden;pointer-events:none;
    transition:width .44s cubic-bezier(.33,1.28,.4,1), opacity .22s ease, visibility .44s}
  .ot-tempo.open .ot-tmenu{opacity:1;visibility:visible;pointer-events:auto}
  .ot-tmenu-inner{position:relative;display:flex;align-items:center;gap:3px;height:44px}
  .ot-topt{position:relative;z-index:1;width:44px;height:44px;flex:none;border:0;background:transparent;
    color:rgba(255,255,255,.82);cursor:pointer;border-radius:50%;
    font-family:var(--cond);font-weight:800;font-size:20px;letter-spacing:0;
    display:grid;place-items:center;transition:color .3s ease}
  .ot-topt.on{color:var(--deep)}
  .ot-tthumb{position:absolute;top:0;left:0;height:44px;width:44px;z-index:0;border-radius:50%;
    background:#fff;box-shadow:0 5px 14px -5px rgba(0,0,0,.5);
    transition:transform .46s cubic-bezier(.34,1.35,.36,1), width .46s cubic-bezier(.34,1.35,.36,1)}

  /* ===== Korean visual motifs ===== */
  .stage{
    background:
      radial-gradient(120% 80% at 50% -20%, #FBF9F3, transparent 60%),
      var(--page);
  }
  .stage::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.5;
    background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160"><filter id="p"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter><rect width="160" height="160" filter="url(%23p)" opacity="0.035"/></svg>')}
  .surface{z-index:1}

  /* Seal stamp */
  .sealmark{display:block;filter:drop-shadow(0 6px 14px rgba(140,13,23,.28))}
  .sealmark text{font-family:var(--cond),serif}

  /* Ink-wash mountains */
  .mtn{position:absolute;left:0;right:0;bottom:0;width:100%;height:auto;pointer-events:none}
  .mtn .mr{fill:currentColor}
  .mtn .mr3{opacity:.12}
  .mtn .mr2{opacity:.20}
  .mtn .mr1{opacity:.34}

  /* Cloud scroll divider */
  .cloud{width:120px;height:34px;color:var(--gray)}
  .clouddiv{display:flex;align-items:center;justify-content:center;gap:12px;margin:30px 0 6px}
  .clouddiv .cl-t{font-family:var(--cond);text-transform:uppercase;letter-spacing:.22em;font-size:11px;
    color:var(--gray);white-space:nowrap}
  .clouddiv .cloud{width:78px}

  /* Taegeuk */
  .taegeuk{display:block}

  /* Hanok lattice texture (창살) */
  .lattice{position:relative}
  .lattice::before{content:"";position:absolute;inset:0;pointer-events:none;border-radius:inherit;opacity:.5;
    -webkit-mask-image:linear-gradient(180deg,transparent,#000 40%);mask-image:linear-gradient(180deg,transparent,#000 40%);
    background-image:
      linear-gradient(rgba(255,255,255,.14) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.14) 1px, transparent 1px);
    background-size:20px 20px}

  /* Hangul micro-label */
  .han-lab{font-size:12px;color:var(--gray);letter-spacing:.02em}

  /* ---------- Naslag: category grid ---------- */
  .catgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-top:22px}
  .catcard{position:relative;overflow:hidden;text-align:left;border:1px solid var(--line);
    border-radius:22px;padding:15px 14px 14px;min-height:162px;isolation:isolate;cursor:pointer;font:inherit;
    background:
      linear-gradient(162deg, rgba(255,255,255,.90), rgba(255,255,255,.965)),
      linear-gradient(162deg, var(--cc-el), var(--cc-deep));
    box-shadow:0 14px 30px -24px rgba(16,24,40,.55);
    transition:transform .14s ease, box-shadow .2s ease}
  .catcard:active{transform:scale(.984)}
  .catcard.wide{grid-column:1 / -1;min-height:0;padding:19px 19px 17px;border-color:transparent;color:#fff;
    background:
      radial-gradient(120% 90% at 86% 6%, rgba(255,255,255,.16), transparent 54%),
      linear-gradient(158deg, var(--cc-el) 2%, var(--cc-deep) 96%);
    box-shadow:0 22px 42px -26px rgba(16,24,40,.6)}
  .cc-deco{position:absolute;left:0;right:0;bottom:0;height:54px;overflow:hidden;z-index:-1;color:var(--cc-el);opacity:.55}
  .cc-deco .mtn{height:54px}
  .catcard.wide .cc-deco{color:#fff;opacity:.9;height:60px}
  .catcard.wide .cc-deco .mtn{height:60px}
  .cc-wm{position:absolute;right:-4px;top:-16px;z-index:-1;user-select:none;pointer-events:none;
    font-family:var(--kor);
    font-weight:800;font-size:94px;line-height:1;color:var(--cc-el);opacity:.10}
  .catcard.wide .cc-wm{font-size:118px;color:#fff;opacity:.14;top:-18px;right:4px}
  .cc-head{display:flex;align-items:center;gap:9px;margin-bottom:11px}
  .cc-emb{width:38px;height:38px;flex:none;border-radius:12px;display:grid;place-items:center;color:#fff;
    font-family:var(--kor);font-weight:800;font-size:19px;
    background:linear-gradient(150deg, var(--cc-el), var(--cc-deep));box-shadow:0 6px 14px -8px var(--cc-deep)}
  .catcard.wide .cc-emb{width:42px;height:42px;font-size:21px;background:linear-gradient(150deg, rgba(255,255,255,.30), rgba(255,255,255,.10));
    border:1px solid rgba(255,255,255,.34);box-shadow:none}
  .cc-count{margin-left:auto;font-family:var(--cond);font-weight:700;font-size:12px;letter-spacing:.04em;
    color:var(--cc-deep);background:rgba(0,0,0,.045);border-radius:999px;padding:4px 9px}
  .catcard.wide .cc-count{color:#fff;background:rgba(255,255,255,.18)}
  .cc-title{font-family:var(--cond);text-transform:uppercase;font-weight:800;font-size:17.5px;line-height:1.02;
    letter-spacing:.005em;color:var(--ink)}
  .catcard.wide .cc-title{color:#fff;font-size:23px}
  .cc-lead{margin-top:5px;font-size:12px;color:var(--gray);display:flex;align-items:center;gap:6px}
  .cc-lead.hot{color:var(--cc-deep);font-weight:600}
  .catcard.wide .cc-lead{color:rgba(255,255,255,.9);font-size:12.5px}
  .catcard.wide .cc-lead.hot{color:#fff}
  .cc-dot{width:7px;height:7px;border-radius:50%;background:var(--cc-el);flex:none}
  .catcard.wide .cc-dot{background:#fff}
  .cc-terms{margin-top:12px;display:flex;flex-direction:column;gap:5px}
  .catcard.wide .cc-terms{margin-top:13px}
  .cc-term{display:flex;align-items:center;gap:7px;font-size:12.5px;line-height:1.2}
  .cc-bk{flex:none;width:13px;height:13px;color:var(--cc-el);display:inline-flex}
  .cc-bk svg{width:13px;height:13px}
  .catcard.wide .cc-bk{color:#fff}
  .cc-ro{font-weight:600;color:var(--ink)}
  .catcard.wide .cc-ro{color:#fff}
  .cc-nl{color:var(--gray);margin-left:auto;font-size:11.5px;white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;max-width:11ch}
  .catcard.wide .cc-nl{color:rgba(255,255,255,.84)}

  /* ---------- Naslag: category detail sheet ---------- */
  .catsheet{background:var(--page)}
  .cs-hero{position:relative;isolation:isolate;overflow:hidden;color:#fff;flex:none;
    padding:calc(env(safe-area-inset-top) + 22px) 22px 34px}
  .cs-mtn{position:absolute;left:0;right:0;bottom:0;height:92px;color:#fff;opacity:.85;z-index:-1}
  .cs-mtn .mtn{height:92px}
  .cs-wm{position:absolute;right:4px;top:2px;z-index:-1;user-select:none;pointer-events:none;
    font-family:var(--kor);
    font-weight:800;font-size:150px;line-height:1;color:#fff;opacity:.12}
  .cs-x{position:absolute;top:calc(env(safe-area-inset-top) + 16px);right:18px;width:38px;height:38px;border:0;
    border-radius:50%;display:grid;place-items:center;color:#fff;z-index:2;cursor:pointer;
    background:rgba(255,255,255,.16);-webkit-backdrop-filter:blur(10px) saturate(1.3);backdrop-filter:blur(10px) saturate(1.3);
    border:1px solid rgba(255,255,255,.28)}
  .cs-x svg{width:17px;height:17px}
  .cs-head{position:relative;z-index:1;margin-top:38px}
  .cs-eye{font-family:var(--cond);text-transform:uppercase;letter-spacing:.2em;font-size:11px;color:rgba(255,255,255,.82)}
  .cs-title{font-family:var(--cond);text-transform:uppercase;font-weight:800;font-size:33px;line-height:.98;
    letter-spacing:-.01em;margin:6px 0 0}
  .cs-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .cs-chip{font-family:var(--cond);text-transform:uppercase;letter-spacing:.05em;font-size:11.5px;font-weight:700;
    padding:7px 12px;border-radius:999px;display:inline-flex;align-items:center;gap:5px}
  .cs-chip.glass{background:rgba(255,255,255,.15);-webkit-backdrop-filter:blur(12px) saturate(1.3);
    backdrop-filter:blur(12px) saturate(1.3);border:1px solid rgba(255,255,255,.26);color:#fff}
  .cs-chip.hot{background:rgba(255,255,255,.92);color:var(--deep);border-color:transparent}
  .cs-chip svg{width:13px;height:13px}
  .cs-body{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;position:relative;z-index:3;
    margin-top:-18px;border-radius:22px 22px 0 0;background:var(--page);
    padding:22px 20px calc(env(safe-area-inset-bottom) + 24px);box-shadow:0 -10px 24px -18px rgba(16,24,40,.4)}
  .cs-body::-webkit-scrollbar{display:none}
  .cs-note{font-size:12.5px;line-height:1.5;color:var(--gray);margin-bottom:16px}
  .cs-note svg{width:14px;height:14px;vertical-align:-2px;margin:0 1px}
  .ct-list{display:flex;flex-direction:column;gap:9px}
  .ct-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);
    border-radius:15px;padding:12px 13px}
  .ct-row.hard{border-color:transparent;
    background:linear-gradient(160deg, rgba(255,255,255,.85), rgba(255,255,255,.95)), linear-gradient(160deg, var(--el), var(--deep))}
  .ct-tx{flex:1;min-width:0}
  .ct-ko{font-size:19px;font-weight:700;color:var(--ink);line-height:1.16}
  .ct-meta{font-size:13px;color:var(--gray);margin-top:2px}
  .ct-meta b{color:var(--deep);font-weight:700}
  .ct-nl{color:var(--gray)}
  .ct-bk{flex:none;color:var(--el);display:inline-flex}
  .ct-bk svg{width:16px;height:16px}
  .ct-say{flex:none;width:40px;height:40px;border:0;border-radius:12px;display:grid;place-items:center;cursor:pointer;
    color:#fff;background:linear-gradient(150deg,var(--el),var(--deep))}
  .ct-say svg{width:18px;height:18px}
  /* interactive hard-mark toggle on term rows */
  .ct-bk-btn{flex:none;width:38px;height:38px;border:0;background:transparent;border-radius:11px;cursor:pointer;
    display:grid;place-items:center;color:var(--gray);transition:color .18s ease,background .18s ease,transform .12s ease}
  .ct-bk-btn svg{width:18px;height:18px}
  .ct-bk-btn.on{color:var(--el)}
  .ct-bk-btn:active{transform:scale(.86)}
  .ct-bk-btn.bkpop{animation:bkpop .34s cubic-bezier(.34,1.4,.4,1)}
  @keyframes bkpop{0%{transform:scale(1)}40%{transform:scale(1.32)}100%{transform:scale(1)}}
  .ct-grp{display:block;margin-top:3px;font-family:var(--cond);text-transform:uppercase;letter-spacing:.05em;
    font-size:10.5px;color:var(--el);opacity:.85}
  /* Woorden search + filter chips */
  .wsearch-wrap{position:relative;margin:2px 0 12px}
  .wsearch-ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gray);pointer-events:none}
  .wsearch-ic svg{width:18px;height:18px;display:block}
  .wsearch{width:100%;box-sizing:border-box;height:46px;padding:0 16px 0 42px;border-radius:15px;
    border:1px solid var(--line);background:var(--surface);color:var(--ink);font-size:15px;font-family:inherit;
    -webkit-appearance:none;outline:none;transition:border-color .18s ease,box-shadow .18s ease}
  .wsearch:focus{border-color:var(--seal);box-shadow:0 0 0 3px rgba(197,1,22,.12)}
  .wsearch::placeholder{color:var(--gray)}
  .wchips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .wchip{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);background:var(--surface);
    color:var(--gray);border-radius:999px;padding:7px 14px;font-size:12.5px;font-weight:600;cursor:pointer;
    font-family:var(--cond);text-transform:uppercase;letter-spacing:.03em}
  .wchip svg{width:13px;height:13px}
  .wchip.on{background:var(--ink);border-color:var(--ink);color:#fff}
  .wresults .ct-list{margin-top:2px}
  .wempty{color:var(--gray);font-size:14px;text-align:center;padding:30px 0}
  /* Handboek — interactive examenkaart checklist */
  .hb-prog{display:flex;align-items:center;gap:12px;margin:2px 2px 16px}
  .hb-prog-bar{flex:1;height:8px;border-radius:99px;background:var(--line);overflow:hidden}
  .hb-prog-bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--el),var(--deep));
    transition:width .4s cubic-bezier(.4,1.2,.4,1)}
  .hb-prog-n{font-family:var(--cond);font-weight:800;font-size:15px;color:var(--deep);min-width:34px;text-align:right}

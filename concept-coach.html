  .hb-exlist{display:flex;flex-direction:column;gap:9px}
  .hb-exrow{display:flex;gap:12px;align-items:flex-start;text-align:left;width:100%;cursor:pointer;
    background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:13px 14px;
    transition:border-color .18s ease,background .18s ease}

  /* ---- Element theme per form ---- */

    }
    return '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">'+bars+'</svg>';

    term:'<svg viewBox="0 0 24 24" fill="none"><path fill="currentColor" d="M8.475 4.412h4.829V5.84h-1.777c-.652 1.795-1.53 3.274-2.65 4.486 1.25.965 2.79 1.681 4.644 2.098-.35.339-.822 1.028-1.052 1.452-1.958-.512-3.535-1.318-4.817-2.406-1.314 1.058-2.885 1.852-4.732 2.43-.17-.363-.63-1.065-.92-1.416 1.803-.474 3.311-1.16 4.546-2.102C5.45 9.135 4.618 7.616 3.965 5.84H2.218V4.412h4.756V2.5h1.5zM5.577 5.84c.515 1.31 1.23 2.475 2.163 3.46.882-.95 1.574-2.094 2.086-3.46zM16.161 12h2.124L22 21.5h-2.044l-.815-2.191h-3.888l-.816 2.191H12.5zm2.472 5.866-.775-2.218q-.148-.423-.334-1.048a39 39 0 0 1-.307-1.103h-.027a52 52 0 0 1-.32 1.062q-.188.585-.362 1.089l-.774 2.218z"/><path stroke="currentColor" stroke-width="1.5" d="M8.5 17v3.25a.75.75 0 0 1-.75.75H4.5M15.52 8.014l-.016-3.25a.75.75 0 0 1 .746-.754l3.25-.016M8 20.5 3 16M16.003 4.512 21 9"/></svg>',

    compass:'<svg viewBox="0 0 24 24" fill="none"><path stroke="currentColor" stroke-width="1.5" d="M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Z"/><path fill="currentColor" fill-rule="evenodd" d="M9.908 9.69a.38.38 0 0 0-.218.218L7.296 16.22a.375.375 0 0 0 .483.483l6.313-2.394c.1-.038.18-.117.218-.218l2.394-6.313a.375.375 0 0 0-.483-.483zM12 13.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3" clip-rule="evenodd"/></svg>',
    target:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.4" fill="currentColor"/></svg>',

  };

  /* ---- Korean visual motifs (SVG) ---- */
  // Hand-stamped seal (도장 / 낙관) — the reward mark
  function sealSVG(ch, size){
    size = size || 78;
    var uid = 's'+Math.random().toString(36).slice(2,7);
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 100 100" class="sealmark" aria-hidden="true">'+
      '<defs><filter id="'+uid+'" x="-8%" y="-8%" width="116%" height="116%">'+
        '<feTurbulence type="fractalNoise" baseFrequency="0.72" numOctaves="2" seed="7" result="n"/>'+
        '<feDisplacementMap in="SourceGraphic" in2="n" scale="2.6"/></filter></defs>'+
      '<g filter="url(#'+uid+')">'+
        '<rect x="7" y="7" width="86" height="86" rx="14" fill="var(--seal)"/>'+
        '<rect x="14.5" y="14.5" width="71" height="71" rx="9" fill="none" stroke="#fff" stroke-width="2.4" opacity=".92"/>'+
        '<text x="50" y="53" text-anchor="middle" dominant-baseline="central" font-family="var(--cond),serif" font-weight="800" font-size="44" fill="#fff">'+ch+'</text>'+
      '</g></svg>';
  }
  // Layered ink-wash mountain ridges (산수화) — front ridge darkest
  function mountainSVG(){
    return '<svg class="mtn" viewBox="0 0 390 130" preserveAspectRatio="none" aria-hidden="true">'+
      '<path class="mr mr3" d="M0,130 L0,58 Q54,24 104,50 Q150,74 210,40 Q286,-4 390,44 L390,130 Z"/>'+
      '<path class="mr mr2" d="M0,130 L0,84 Q70,52 148,78 Q214,100 286,72 Q340,50 390,80 L390,130 Z"/>'+
      '<path class="mr mr1" d="M0,130 L0,108 Q96,86 196,104 Q300,122 390,100 L390,130 Z"/>'+
      '</svg>';
  }
  // Auspicious cloud scroll (구름 무늬) — a single ruyi-style head
  function cloudSVG(){
    return '<svg class="cloud" viewBox="0 0 120 34" fill="none" aria-hidden="true">'+
      '<path d="M6 26 Q6 14 18 14 Q22 6 32 8 Q40 2 48 10 Q60 8 60 20 Q72 14 78 22 Q92 16 96 26" '+

      '<circle cx="103" cy="24" r="2.1" fill="currentColor" opacity=".5"/></svg>';
  }
  // Taegeuk (태극) yin-yang, KTA proportions (red top, blue bottom, swirled)
  function taegeukSVG(size){
    size = size || 26;
    return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 100 100" class="taegeuk" aria-hidden="true">'+
      '<clipPath id="tgc"><circle cx="50" cy="50" r="48"/></clipPath>'+

        '<path d="M50 2 A48 48 0 0 1 50 98 A24 24 0 0 1 50 50 A24 24 0 0 0 50 2 Z" fill="#CD2E3A"/>'+
        '<path d="M50 98 A48 48 0 0 1 50 2 A24 24 0 0 1 50 50 A24 24 0 0 0 50 98 Z" fill="#0047A0"/>'+
      '</g><circle cx="50" cy="50" r="48" fill="none" stroke="rgba(0,0,0,.06)" stroke-width="1.5"/></svg>';

  /* ---- Korean counting (native) ---- */
  var COUNT = [['하나','Hana'],['둘','Dul'],['셋','Set'],['넷','Net'],['다섯','Daseot'],
    ['여섯','Yeoseot'],['일곱','Ilgop'],['여덟','Yeodeol'],['아홉','Ahop'],['열','Yeol']];

  /* ---- Journey config (path to 1e poom) ---- */
  var JOURNEY = ['il','i','sam','sa','o','yuk','chil','pal'];
  var DONE = {il:true, i:true};
  var CUR = 'sam';           // today's focus form
  var NEXT_ID = 'sa';        // tomorrow
  var STREAK = 5;

  /* Guep/Poom stepper — Kukkiwon grades the student can pick:
     10e Wit·Il · 8e Geel·I · 6e Groen·Sam+Sa · 4e Blauw·O · 3e Blauw-Rood·Yuk ·
     2e Rood·Chil · 1e Rood-Zwart·Pal · 1e poom Koryo · 2e poom Keumgang */
  var GEUPS = [
    {stop:'10', grade:'10e geup', band:'Wit',        form:'il',                col:'#EDEDE7'},
    {stop:'8',  grade:'8e geup',  band:'Geel',       form:'i',                 col:'#FFD000'},
    {stop:'6',  grade:'6e geup',  band:'Groen',      form:'sam', form2:'sa',   col:'#16A34A'},
    {stop:'4',  grade:'4e geup',  band:'Blauw',      form:'o',                 col:'#2463E0'},
    {stop:'3',  grade:'3e geup',  band:'Blauw-Rood', form:'yuk',               col:'#2463E0', col2:'#C50116'},
    {stop:'2',  grade:'2e geup',  band:'Rood',       form:'chil',              col:'#C50116'},
    {stop:'1',  grade:'1e geup',  band:'Rood-Zwart', form:'pal',               col:'#C50116', col2:'#242327'},
    {stop:'P1', grade:'1e poom',  band:'Zwart',      form:'koryo',             col:'#242327', lines:1},
    {stop:'P2', grade:'2e poom',  band:'Zwart',      form:'keumgang',          col:'#242327', lines:2}
  ];
  var GEUP_I = 4;            // Jayden: 3e geup (blauw-rood) → trains Taegeuk Yuk Jang
  function geupInfo(k){ return GEUPS[Math.max(0,Math.min(GEUPS.length-1,k|0))]; }
  function geupForm(g){
    var f=byId(g.form); if(!f) return '';
    if(g.form2){ var f2=byId(g.form2); if(f2) return 'Taegeuk '+f.sino+' & '+f2.sino+' Jang'; }
    return f.korean;
  }
  function mascotBelt(g){
    var m={'Wit':'white','Geel':'yellow','Groen':'green','Blauw':'blue','Blauw-Rood':'blue',
           'Rood':'red','Rood-Zwart':'red','Zwart':'black'};
    return m[g && g.band] || 'blue';
  }
  // Rotating mascot: a fresh random pose on each app-open and each time you land on Vandaag
  // (stable within a visit, so toggling missions doesn't make it jump).
  var DAY_MASCOTS=['cheer','ready','guard','frontkick','sidekick','highkick'];
  function randPose(prev){
    var opts=DAY_MASCOTS.filter(function(p){ return p!==prev; });
    return opts[Math.floor(Math.random()*opts.length)];
  }
  var _mascPose = randPose(null);
  function dayMascot(){
    var slug=mascotBelt(geupInfo(GEUP_I));
    return 'assets/mascot/day/kid-'+_mascPose+'-'+slug+'.png';
  }
  // Belt colour as a CSS paint for the profile ring (dual belts → soft diagonal split).
  function beltRingCss(g){
    if(g && g.col2) return 'linear-gradient(135deg,'+g.col+' 0 42%,'+g.col2+' 58% 100%)';
    return (g && g.col) || '#E6E8EC';
  }
  function setBelt(k, commit){
    k = Math.max(0, Math.min(GEUPS.length-1, k|0));
    GEUP_I = k;
    var g = GEUPS[k];
    DONE = {};
    var fi = JOURNEY.indexOf(g.form);
    if(fi>=0){                                   // Taegeuk stop: g.form = the form you TRAIN at this grade
      for(var j=0;j<fi;j++) DONE[JOURNEY[j]] = true;    // earlier Taegeuk forms are behind you
      CUR = g.form;                                      // train this grade's own form (1e geup → Pal Jang)
      NEXT_ID = JOURNEY[fi+1] || 'koryo';                // next up (after Pal Jang comes Koryo)
    } else {                                     // poom stop: black-belt forms
      JOURNEY.forEach(function(id){ DONE[id]=true; });   // all Taegeuk forms behind you
      if(g.form==='keumgang'){ DONE['koryo']=true; CUR='keumgang'; NEXT_ID=null; }  // 2e poom → Keumgang
      else { CUR='koryo'; NEXT_ID='keumgang'; }          // 1e poom → Koryo
    }
    paintNav();
    if(commit) showScreen(state.screen);
  }
  var bpLastK = null;   // last slider index, to derive slide direction for the belt-info line
  function beltLive(k){
    var g = geupInfo(k), root = stage.querySelector('.beltpick'); if(!root) return;
    var dir = (bpLastK==null || k>=bpLastK) ? 1 : -1;   // right = up a grade, left = down

  function dualBg(g){ return g.col2 ? ('linear-gradient(90deg,'+g.col+' 0 20%,'+g.col2+' 80% 100%)') : g.col; }

  /* one reusable term row: hangul + roman·nl (+ optional group tag) + hard-mark toggle + speaker */
  function termRowHtml(it, groupName){
    var h = !!HARD[it.roman];
    return '<div class="ct-row'+(h?' hard':'')+'" data-term="'+esc(it.roman)+'">'+
      '<div class="ct-tx"><div class="ct-ko">'+esc(it.ko)+'</div>'+

          (groupName?'<span class="ct-grp">'+esc(groupName)+'</span>':'')+'</div></div>'+
      '<button class="ct-bk-btn'+(h?' on':'')+'" data-act="hardterm" data-k="'+esc(it.roman)+'" '+
        'aria-pressed="'+(h?'true':'false')+'" aria-label="Markeer als moeilijk">'+(h?IC.bookmark:IC.bookmarkO)+'</button>'+
      '<button class="ct-say" data-act="say" data-ko="'+esc(it.ko)+'" aria-label="Uitspraak">'+IC.speak+'</button>'+
    '</div>';
  }
  function wRender(node){
    var input = node.querySelector('#wsearch');
    var q = ((input&&input.value)||'').trim().toLowerCase();
    var mode = node.__wmode||'all';
    var grid = node.querySelector('#wgrid'), res = node.querySelector('#wresults');
    if(!grid||!res) return;
    if(!q && mode==='all'){ grid.style.display=''; res.style.display='none'; res.innerHTML=''; return; }
    var list=[];
    TERMEN.forEach(function(g){ (g.items||[]).forEach(function(it){
      if(mode==='hard' && !HARD[it.roman]) return;
      if(q){ var hay=((it.ko||'')+' '+(it.roman||'')+' '+(it.nl||'')).toLowerCase(); if(hay.indexOf(q)<0) return; }
      list.push({it:it, groep:g.groep});
    }); });
    grid.style.display='none'; res.style.display='';
    if(!list.length){ res.innerHTML='<div class="wempty">Geen woorden gevonden.</div>'; return; }
    res.innerHTML='<div class="ct-list">'+list.map(function(r){ return termRowHtml(r.it, r.groep); }).join('')+'</div>';
  }
  /* toggle a term's "moeilijk" mark (in-memory) + update the row, chips and counts in place */
  function toggleHardTerm(roman, btn){
    if(!roman) return;
    var on = !HARD[roman];
    if(on) HARD[roman]=1; else delete HARD[roman];
    if(btn){
      btn.classList.toggle('on', on);
      btn.setAttribute('aria-pressed', on?'true':'false');
      btn.innerHTML = on?IC.bookmark:IC.bookmarkO;
      btn.classList.remove('bkpop'); void btn.offsetWidth; btn.classList.add('bkpop');
      var row = btn.closest('.ct-row'); if(row) row.classList.toggle('hard', on);
    }
    refreshCatChip();
    refreshHardCount();
  }

  // lighten(+)/darken(-) a #rrggbb hex by pct toward white/black
  function shade(hex, pct){
    var h=hex.replace('#',''); if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
    var r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
    var t=pct<0?0:255, p=Math.abs(pct)/100;
    function mix(c){ return Math.round((t-c)*p+c); }
    function hx(c){ return ('0'+c.toString(16)).slice(-2); }
    return '#'+hx(mix(r))+hx(mix(g))+hx(mix(b));
  }

  var examEl = null, examState = null;
  function examBank(){
    var src = (window.POOM_VRAGEN && window.POOM_VRAGEN.vragen) || [];
    var out = [];
    src.forEach(function(q){
      if(q.niveau==='poom2' && POOM!=='2') return;        // Koryo-theorie pas vanaf 2e poom
      var opts = (q.opties||[]).slice();
      var ai = opts.indexOf(q.antwoord);
      if(opts.length<2 || ai<0){                          // ongeldige vraag → melden + overslaan
        if(window.console) console.warn('[examen] vraag overgeslagen (antwoord niet in opties):', q.id); return; }
      out.push({ v:q.vraag, o:opts, a:ai, cat:q.categorie||'', why:q.toelichting||'' });
    });
    return out;
  }
  function examShuffle(arr){
    var a = arr.slice();
    for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; }
    return a;
  }
  function openExam(){
    if(examEl) return;
    var rule = examRule();
    var bank = examBank();
    if(!bank.length){ return; }
    var n = Math.min(rule.total, bank.length);
    var qs = examShuffle(bank).slice(0, n);
    examState = { qs:qs, i:0, goed:0, fout:0, total:n, maxFout:rule.fout, pass:Math.max(1, n-rule.fout), answered:false };
    var el = document.createElement('div');
    el.className='session exam'; el.id='exam';
    applyTheme(el, CUR);
    el.innerHTML =
      '<div class="shead">'+

      otState._lastFrac=frac;
    }, fo);
  }
  function otTick(){
    if(otState.phase==='ready'){
      otState.ready--;
      if(otState.ready>0){ otRender(); buzz(6); otSchedule(); return; }
      // ready hit 0: let the third (last) dot finish draining before the count begins
      otRender(); buzz(6);            // renders ○○○ — the last pip animates out over ~0.5s
      clearTimeout(otState.iv);
      otState.iv=setTimeout(function(){
        if(otState.phase!=='ready') return;
        otState.phase='count'; otState.i=0; otRender(); otPop(); speak(COUNT[0][0]); buzz(14); otSchedule();
      }, OT_DRAIN);
      return;
    }
    if(otState.i>=COUNT.length-1){
      if(otState.loop){ otLoopWrap(); otSchedule(); }
      else { otStop(); otRender(); buzz(22); if(Math.random()<0.45) otMascotPeek(); }
      return;
    }
    otState.i++; otRender(); otPop(); speak(COUNT[otState.i][0]); buzz(6); otSchedule();
  }
  function otStart(){
    otCloseFan();
    otState.phase='ready'; otState.ready=OT_READY; otState.i=0; otState.running=true;
    otRender(); speak('준비'); buzz(16); otSchedule();
  }
  function otPause(){
    otState.running=false; clearTimeout(otState.iv);
    var hint=timerScreen&&timerScreen.querySelector('#ot-hint');
    if(hint){ hint.textContent='gepauzeerd — tik om verder te gaan'; hint.style.opacity='1'; }
  }
  function otResume(){
    otState.running=true;
    var hint=timerScreen&&timerScreen.querySelector('#ot-hint'); if(hint) hint.style.opacity='0';
    otSchedule();
  }
  function otTap(){
    var w=timerScreen&&timerScreen.querySelector('.ot-tempo');
    if(w && w.classList.contains('open')){ otCloseFan(); return; }
    if(otState.running){ otPause(); return; }
    var finished=(otState.phase==='count' && otState.i>=COUNT.length-1);
    if(otState.phase==='idle' || finished){ otStart(); }
    else { otResume(); }
  }
  function otReset(){
    otCloseFan(); clearTimeout(otState.iv); clearTimeout(otState._wrapT); otState.running=false;
    otState.phase='idle'; otState.ready=OT_READY; otState.i=0;
    var pr=timerScreen&&timerScreen.querySelector('#ot-prog'), kg=timerScreen&&timerScreen.querySelector('#ot-knobg');
    if(pr) pr.style.opacity=''; if(kg) kg.style.opacity='';
    otSyncControls(); otRender();
  }
  function otRepeat(){
    otCloseFan(); otState.loop=!otState.loop;
    var b=timerScreen&&timerScreen.querySelector('#ot-repeat'); if(b) b.classList.toggle('on', otState.loop);
  }
  function otTempo(){
    var host=timerScreen; if(!host) return;
    var w=host.querySelector('.ot-tempo'); if(!w) return;
    if(w.classList.contains('open')){ otCloseFan(); return; }
    var menu=w.querySelector('.ot-tmenu'), inner=w.querySelector('.ot-tmenu-inner');
    w.classList.add('open');
    if(menu&&inner) menu.style.width=(inner.offsetWidth+12)+'px';
    moveTempoThumb(false);
  }
  function otCloseFan(){
    var host=timerScreen; if(!host) return;
    var w=host.querySelector('.ot-tempo'); if(!w||!w.classList.contains('open')) return;
    var menu=w.querySelector('.ot-tmenu');
    w.classList.remove('open');
    if(menu) menu.style.width='';
  }
  function otSpeed(v){
    otState.speed=parseFloat(v); otSyncControls(); moveTempoThumb(true);
    if(otState.running) otSchedule();
    setTimeout(otCloseFan, 480);
  }
  function otStop(){ if(otState.iv){ clearTimeout(otState.iv); otState.iv=null; } clearTimeout(otState._wrapT); otState.running=false; }
  /* When a set finishes, now and then a mascot rises from the bottom to greet Jayden — large face,
     stopping as it reaches the counter ring, layered behind the transport buttons for depth. */
  function otMascotPeek(){
    var host=timerScreen; if(!host) return;
    if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    var wrap=host.querySelector('#ot-masc'),
        base=host.querySelector('#ot-masc-base'), blink=host.querySelector('#ot-masc-blink');
    if(!wrap||!base) return;
    var poses=['cheer','ready','guard'], pose=poses[Math.floor(Math.random()*poses.length)];
    var slug=mascotBelt(geupInfo(GEUP_I));
    var src='assets/mascot/day/kid-'+pose+'-'+slug+'.png';
    base.src=src; if(blink) blink.src=src.replace(/\.png$/,'-blink.png');
    wrap.classList.remove('peek'); void wrap.offsetWidth; wrap.classList.add('peek');
  }
  function planItem(n,t,s){
    return '<div class="pi"><span class="pn">'+n+'</span><span class="pt">'+t+'<small>'+s+'</small></span></div>';
  }
  function sHead(k,h,sub){
    return '<div class="sh"><div class="k">'+k+'</div><h2>'+h+'</h2>'+(sub?'<p class="sub">'+sub+'</p>':'')+'</div>';
  }
  function tomorrowCard(){
    var n = byId(NEXT_ID), t = th(NEXT_ID);
    return '<div class="tmrw" style="--nx-el:'+t.el+';--nx-deep:'+t.deep+'">'+
      '<span class="tm-ic">'+trigramSVG(n.trigram)+'</span>'+
      '<span class="tm-t"><small>Morgen verder met</small><b>'+esc(n.korean)+'</b></span>'+
      IC.arrow.replace('width="2.4"','width="2"')+
    '</div>';
  }

  /* counting is handled by the teller (tlTick) — legacy grid animation removed */

  /* ---- confetti ---- */
  function confetti(){
    var cols=['#F0522B','#E11D3F','#2440B8','#12B76A','#F5A623','#FFFFFF'];
    var wrap=document.createElement('div'); wrap.className='confetti';
    var w=390;
    for(var i=0;i<52;i++){
      var s=document.createElement('i');
      s.style.left=(Math.random()*w)+'px';
      s.style.background=cols[i%cols.length];
      s.style.setProperty('--r',(Math.random()*720-360)+'deg');
      s.style.animationDelay=(Math.random()*.35)+'s';
      s.style.animationDuration=(1.5+Math.random()*.9)+'s';
      wrap.appendChild(s);
    }
    (session||stage).appendChild(wrap);
    setTimeout(function(){ if(wrap.parentNode) wrap.parentNode.removeChild(wrap); }, 2600);
  }

  /* =========================================================
     Navigation between surfaces
     ========================================================= */
  function moveNavHL(){
    var hl=document.getElementById('fnav-hl'); if(!hl) return;
    var on=fnav.querySelector('button.on'); if(!on) return;
    hl.style.width=on.offsetWidth+'px';
    hl.style.transform='translateX('+on.offsetLeft+'px)';
    hl.classList.add('ready');
  }
  function showScreen(name){
    var prev=state.screen;
    if(name==='today' && prev!=='today') _mascPose = randPose(_mascPose);
    state.screen=name;
    [].forEach.call(stage.querySelectorAll('.screen-wrap'),function(n){ n.remove(); });
    if(name==='today') renderToday(); else if(name==='handboek') renderHandbook(); else if(name==='woorden'||name==='library') renderLibrary(); else renderJourney();
    [].forEach.call(fnav.querySelectorAll('button'),function(b){
      b.classList.toggle('on', b.getAttribute('data-nav')===name);
    });
    moveNavHL();
    paintNav();
    if(name==='today') scheduleBlink(); else stopBlink();
  }
  window.addEventListener('resize', moveNavHL);

  /* ---- greeting mascot: gentle natural eye-blink ---- */
  var blinkTO=null;
  function stopBlink(){ if(blinkTO){ clearTimeout(blinkTO); blinkTO=null; } }
  function blinkOnce(el, dbl){
    el.classList.add('blink');
    setTimeout(function(){ el.classList.remove('blink');
      if(dbl){ setTimeout(function(){ el.classList.add('blink');
        setTimeout(function(){ el.classList.remove('blink'); }, 105); }, 115); }
    }, 105);
  }
  function scheduleBlink(){
    stopBlink();
    if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    function next(delay){
      blinkTO=setTimeout(function(){
        var el=stage.querySelector('.greet-masc .gm-b');
        if(!el){ stopBlink(); return; }
        blinkOnce(el, Math.random()<0.24);
        next(2600+Math.random()*3800);
      }, delay);
    }
    next(1500+Math.random()*1600);
  }
  function mascWink(){
    var el=stage.querySelector('.greet-masc .gm-b');
    if(!el) return;
    blinkOnce(el, true);   /* playful double-blink reaction on tap */
    scheduleBlink();       /* push the ambient blink out so it won't fire right after */
  }

  /* ---- global click handling ---- */
  document.addEventListener('click', function(e){
    var navBtn = e.target.closest && e.target.closest('[data-nav]');
    if(navBtn){ showScreen(navBtn.getAttribute('data-nav')); return; }
    var act = e.target.closest && e.target.closest('[data-act]');
    if(!act) return;
    var a = act.getAttribute('data-act');
    if(a==='start'){ openSession(); }
    else if(a==='startexam'){ openExam(); }
    else if(a==='exanswer'){ examAnswer(act); }
    else if(a==='exnext'){ examNext(); }
    else if(a==='exretry'){ examRetry(); }
    else if(a==='exclose'){ closeExam(); showScreen('today'); }
    else if(a==='opentimer'){ openTimer(); }
    else if(a==='timerclose'){ closeTimer(); }
    else if(a==='journey'){ showScreen('journey'); }
    else if(a==='sclose'){ closeSession(); showScreen('today'); }
    else if(a==='next'){ stepFwd(); }
    else if(a==='count'){ /* legacy warmup grid removed — teller handles counting */ }
    else if(a==='ttoggle'){ ptToggle(); }
    else if(a==='treset'){ ptReset(); }
    else if(a==='tltoggle'){ tlToggle(); }
    else if(a==='tltap'){ tlTap(); }
    else if(a==='tlreset'){ tlReset(); }
    else if(a==='tlrepeat'){ tlRepeat(); }
    else if(a==='tltempo'){ tlTempo(); }
    else if(a==='tlspeed'){ tlSpeed(act.getAttribute('data-v')); }
    else if(a==='ottap'){ otTap(); }
    else if(a==='otreset'){ otReset(); }
    else if(a==='otrepeat'){ otRepeat(); }
    else if(a==='ottempo'){ otTempo(); }
    else if(a==='otspeed'){ otSpeed(act.getAttribute('data-v')); }
    else if(a==='say'){ speak(act.getAttribute('data-ko'), act.getAttribute('data-stop')?act:act); }
    else if(a==='flip'){ var fl=session.querySelector('#flip'); if(fl) fl.classList.toggle('flipped'); }
    else if(a==='answer'){ handleAnswer(act); }
    else if(a==='reflect'){ openReflection(); }
    else if(a==='beltsheet'){ openBeltSheet(); }
    else if(a==='beltsheetclose'){ closeBeltSheet(); }
    else if(a==='opencat'){ openCat(act.getAttribute('data-groep')); }
    else if(a==='catclose'){ closeCat(); }
    else if(a==='hardterm'){ toggleHardTerm(act.getAttribute('data-k'), act); }
    else if(a==='examchk'){ toggleExamChk(act.getAttribute('data-k')); }
    else if(a==='openhb'){ openHb(act.getAttribute('data-hb')); }
    else if(a==='hbclose'){ closeHb(); }
    else if(a==='rate'){ rfRating=act.getAttribute('data-r'); renderReflect(); }
    else if(a==='pickfocus'){ togglePick(act.getAttribute('data-id')); syncFocusChips(); }
    else if(a==='rnext'){ rfIndex++; renderReflect(); }
    else if(a==='rdone'){ closeReflection(); showScreen('today'); }
    else if(a==='rclose'){ closeReflection(); }
    else if(a==='mission'){ toggleMission(act.getAttribute('data-id')); }
    else if(a==='mascwink'){ mascWink(); }
  });

  function handleAnswer(btn){
    if(btn.parentNode.getAttribute('data-locked')) return;
    var opts = session.querySelector('#opts');
    opts.setAttribute('data-locked','1');
    var chosen=+btn.getAttribute('data-i'), correct=+btn.getAttribute('data-a');
    var all = opts.querySelectorAll('.opt');
    all[correct].classList.add('correct');
    if(chosen!==correct) btn.classList.add('wrong');
    var why=session.querySelector('#why'); if(why) why.classList.add('show');
    var nb=session.querySelector('#checknext');
    if(nb){ nb.disabled=false; nb.style.opacity='1'; nb.classList.remove('ghost');
      nb.innerHTML='Volgende '+IC.arrow; }
  }

  /* ---- daily missions ---- */
  function toggleMission(id){
    if(!(id in missionDone)) return;
    var todayIds = todayMissionIds();
    var before = todayIds.every(function(id){return missionDone[id];});
    missionDone[id] = !missionDone[id];
    var nowOn = missionDone[id];
    var after = todayIds.every(function(id){return missionDone[id];});
    var allDone = after && !before;
    buzz(nowOn?12:6);
    sfx(allDone ? 'complete' : (nowOn ? 'check' : 'uncheck'));
    var sc = stage.querySelector('.surface'); var top = sc?sc.scrollTop:0;
    showScreen('today');
    var ns = stage.querySelector('.surface'); if(ns) ns.scrollTop = top;
    if(nowOn){
      var row = stage.querySelector('.td-item[data-id="'+id+'"]');
      if(row){
        row.classList.add('just');
        var ck = row.querySelector('.ti-ck');
        if(ck){
          var pop=document.createElement('span'); var hp=hitPick(); pop.className='hit-pop hp-'+hp.replace('hit-','');
          pop.style.setProperty('--hit', 'url(assets/icons/'+hp+'.png)');
          ck.appendChild(pop);
          pop.addEventListener('animationend', function(){ if(pop.parentNode) pop.parentNode.removeChild(pop); });
          setTimeout(function(){ if(pop.parentNode) pop.parentNode.removeChild(pop); }, 900);
        }
      }
    }
    if(allDone){
      var chip = stage.querySelector('#streakchip'); if(chip){ chip.classList.remove('flare'); void chip.offsetWidth; chip.classList.add('flare'); }
      confetti();
    }
  }

  /* ---- weekly reflection overlay ---- */
  var reflect=null, rfIndex=0, rfSteps=['rate','focus','done'], rfRating=null, rfPick=[];
  function togglePick(id){
    var i = rfPick.indexOf(id);
    if(i>=0){ rfPick.splice(i,1); }
    else { if(rfPick.length>=FOCUS_MAX) rfPick.shift(); rfPick.push(id); }
  }
  function syncFocusChips(){
    if(!reflect) return;
    var wrap=reflect.querySelector('.fchips'); if(!wrap) return;
    [].forEach.call(wrap.querySelectorAll('.fchip'), function(btn){
      btn.classList.toggle('on', rfPick.indexOf(btn.getAttribute('data-id'))>=0);
    });
    var hint=reflect.querySelector('.rhint');
    if(hint) hint.textContent = rfPick.length
      ? (rfPick.length>=FOCUS_MAX ? FOCUS_MAX+' gekozen — mooi zo!' : rfPick.length+' gekozen — je kunt er '+(FOCUS_MAX-rfPick.length)+' meer kiezen')
      : 'Tik om te kiezen';
    var foot=reflect.querySelector('#rffoot');
    if(foot) foot.innerHTML = rfPick.length
      ? '<button class="nextbtn" data-act="rnext">Klaar '+IC.check+'</button>'
      : '<button class="nextbtn ghost" disabled style="opacity:.4">Kies minstens 1</button>';
  }
  function openReflection(){
    rfIndex = WEEK_FOCUS.length ? 0 : 0;
    rfRating = WEEK_RATING; rfPick = WEEK_FOCUS.slice();
    reflect = document.createElement('div');
    reflect.className='session reflect'; reflect.id='reflect';
    applyTheme(reflect, CUR);
    reflect.innerHTML =
      '<div class="shead"><button class="sx" data-act="rclose" aria-label="Sluiten">'+IC.x+'</button>'+
        '<div class="sprog reflectbar"><i id="rfbar"></i></div></div>'+
      '<div class="sbody" id="rfbody"></div>'+
      '<div class="sfoot" id="rffoot"></div>';
    stage.appendChild(reflect);
    fnav.classList.add('hide');
    requestAnimationFrame(function(){ reflect.classList.add('show'); });
    renderReflect();
  }
  function closeReflection(){
    if(!reflect) return;
    reflect.classList.remove('show');
    var r=reflect; reflect=null;
    setTimeout(function(){ if(r&&r.parentNode) r.parentNode.removeChild(r); }, 300);
    fnav.classList.remove('hide');
  }
  function renderReflect(){
    if(!reflect) return;
    var body=reflect.querySelector('#rfbody'), foot=reflect.querySelector('#rffoot');
    var bar=reflect.querySelector('#rfbar');
    var step=rfSteps[rfIndex];
    var html='', footHtml='';
    if(step==='rate'){
      var opts=[{r:'sterk',em:'💪',t:'Sterk',s:'Ging lekker deze week'},
                {r:'oke',em:'🙂',t:'Oké',s:'Een paar dingen lastig'},
                {r:'pittig',em:'😅',t:'Pittig',s:'Ik wil meer oefenen'}];
      html='<div class="stepin">'+sHead('WEKELIJKSE CHECK-IN','Hoe voelde je training deze week?','Eerlijk zijn helpt je coach je beter te helpen.')+
        '<div class="rate">'+opts.map(function(o){
          return '<button class="rateb'+(rfRating===o.r?' on':'')+'" data-act="rate" data-r="'+o.r+'">'+
            '<span class="re">'+o.em+'</span><span class="rt">'+o.t+'</span><span class="rs">'+o.s+'</span></button>';
        }).join('')+'</div></div>';
      footHtml = rfRating
        ? '<button class="nextbtn" data-act="rnext">Volgende '+IC.arrow+'</button>'
        : '<button class="nextbtn ghost" disabled style="opacity:.4">Kies er één</button>';
    } else if(step==='focus'){
      html='<div class="stepin">'+sHead('JOUW WEEKDOEL','Waar wil je extra op letten?','Kies er 1 tot 5. Je coach zet dit deze week centraal.')+
        '<div class="fchips">'+FOCUS_AREAS.map(function(fa){
          var on=rfPick.indexOf(fa.id)>=0;
          return '<button class="fchip'+(on?' on':'')+'" data-act="pickfocus" data-id="'+fa.id+'">'+
            '<span class="fe">'+fa.em+'</span><span>'+fa.label+'</span><span class="fck">'+IC.check+'</span></button>';
        }).join('')+'</div>'+
        '<div class="rhint">'+(rfPick.length
            ? (rfPick.length>=FOCUS_MAX ? esc(FOCUS_MAX)+' gekozen — mooi zo!' : esc(rfPick.length)+' gekozen — je kunt er '+(FOCUS_MAX-rfPick.length)+' meer kiezen')
            : 'Tik om te kiezen')+'</div></div>';
      footHtml = rfPick.length
        ? '<button class="nextbtn" data-act="rnext">Klaar '+IC.check+'</button>'
        : '<button class="nextbtn ghost" disabled style="opacity:.4">Kies minstens 1</button>';
    } else {
      WEEK_FOCUS = rfPick.slice(); WEEK_RATING = rfRating;
      html='<div class="stepin"><div class="done"><div class="rdone-ic">'+sealSVG('週')+'</div>'+
        '<h2>Weekdoel gezet!</h2>'+
        '<p class="sub">Je coach houdt deze week extra rekening met jouw keuze.</p>'+
        '<div class="rsummary"><span class="rs-k">Deze week werk je aan</span><b>'+esc(weekFocusText())+'</b></div>'+
        '</div></div>';
      footHtml = '<button class="nextbtn" data-act="rdone">Terug naar vandaag</button>';
      confetti();
    }
    body.innerHTML=html; foot.innerHTML=footHtml; body.scrollTop=0;
    if(bar){ bar.style.width = Math.round((rfIndex+1)/rfSteps.length*100)+'%'; }
  }

  /* ---- boot ---- */
  function boot(){ setBelt(GEUP_I, false); renderToday(); scheduleBlink();
    requestAnimationFrame(moveNavHL); setTimeout(moveNavHL, 320); }
  if(poomsae.length){ boot(); }
  else {
    // data not ready yet (shouldn't happen — script loaded before)
    var tries=0, iv=setInterval(function(){
      C=window.CURRICULUM||{}; poomsae=C.poomsae||[];
      if(poomsae.length||++tries>20){ clearInterval(iv); if(poomsae.length) boot(); }
    },80);
  }
})();
</script>
</body>
</html>
